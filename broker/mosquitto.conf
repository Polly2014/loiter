# Loiter — Mosquitto broker 配置
# 用法：mosquitto -c X-Workspace/loiter/broker/mosquitto.conf -v
#
# Sprint 0 / 活动现场用。30 人内部活动，不上 TLS / ACL（见 CLAUDE.md L2）。

listener 1883 0.0.0.0      # 监听所有网卡（含 Internet Sharing 热点网段）
allow_anonymous true       # 匿名连接（Cardputer 无账号体系，v1 接受）

# 持久化（broker 重启不丢 retained 消息；房间状态权威仍在 FastAPI，不依赖这里）
persistence true
persistence_location /tmp/loiter-mosquitto/

# 单连接限制（防单个客户端刷爆）
max_inflight_messages 20
max_queued_messages 100

# 日志
log_type warning
log_type notice
