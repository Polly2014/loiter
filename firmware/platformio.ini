; Loiter v2 — Islands of Color · Cardputer 固件 (PlatformIO)
;
; 烧录：  pio run -e islands -t upload
; 监控：  pio device monitor -b 115200
;
; v2 = Designer 16 屏 UI (main.cpp) + 移植自 v1 的联网层 (net.cpp)。
; 旧 v1 终端固件归档在 src/_v1_archive/（玩法已弃，仅工程参考）。

[env]
platform = espressif32
board = m5stack-stamps3        ; Cardputer = ESP32-S3 (StampS3 核心)
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
; OTA: default_8MB.csv 给双 OTA slot 各 3.3MB（M5Cardputer 8MB Flash）
board_build.partitions = default_8MB.csv
lib_deps =
    m5stack/M5Cardputer@^1.0.3
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1   ; Serial 走 USB CDC（否则输出到 UART0，monitor 收不到）
    -DMQTT_MAX_PACKET_SIZE=2048   ; L3: 抬高 PubSubClient 默认 256B buffer（双语 reading ~760B）
    -DLOITER_FW_VERSION=\"2.0.0\" ; OTA: 嵌入版本号，比对远端 manifest

; ---- v2 正式固件：Designer UI + net 联网层 ----
[env:islands]
build_src_filter = +<main.cpp> +<net.cpp>
