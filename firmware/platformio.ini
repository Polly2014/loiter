; Loiter — Cardputer 固件 (PlatformIO)
; Sprint 0: echo 固件，验证 WiFi + MQTT 链路
;
; 烧录：  pio run -e sprint0 -t upload
; 监控：  pio device monitor -b 115200

[env]
platform = espressif32
board = m5stack-stamps3        ; Cardputer 用 ESP32-S3 (StampS3 核心)
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
lib_deps =
    m5stack/M5Cardputer@^1.0.3
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    -DMQTT_MAX_PACKET_SIZE=1024   ; L3: 抬高 PubSubClient 默认 256B buffer

; ---- Sprint 0: echo 验证固件 ----
[env:sprint0]
build_src_filter = +<sprint0_echo.cpp>

; ---- 正式固件 (Sprint 1 起用) ----
; 终端 UI + 文字聊天 + 频道切换；单文件自包含，等 avatar/UI 长大再拆模块
[env:loiter]
build_src_filter = +<loiter_main.cpp>
