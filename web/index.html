    ctx.save();

    ctx.globalAlpha = alpha * 0.3;
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 1.5;
    const outerR = Math.min(W, H) * 0.22;
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, TAU); ctx.stroke();

    const tickCount = 24;
    for (let i = 0; i < tickCount; i++) {
      const a = (i / tickCount) * TAU + t * 0.0005;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * (outerR - 6), cy + Math.sin(a) * (outerR - 6));
      ctx.lineTo(cx + Math.cos(a) * (outerR + 6), cy + Math.sin(a) * (outerR + 6));
      ctx.stroke();
    }

    const midR = outerR * 0.72;
    ctx.beginPath(); ctx.arc(cx, cy, midR, 0, TAU); ctx.stroke();
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * TAU - t * 0.0008;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * (midR - 4), cy + Math.sin(a) * (midR - 4));
      ctx.lineTo(cx + Math.cos(a) * (midR + 4), cy + Math.sin(a) * (midR + 4));
      ctx.stroke();
    }

    ctx.globalAlpha = alpha * 0.22;
    ctx.lineWidth = 1.2;
    const starR = outerR * 0.55;
    for (let tri = 0; tri < 2; tri++) {
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * TAU + tri * PI / 3 + t * 0.0003 * (tri === 0 ? 1 : -1);
        const x = cx + Math.cos(a) * starR;
        const y = cy + Math.sin(a) * starR;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }

    ctx.globalAlpha = alpha * 0.12;
    const innerR = outerR * 0.3;
    for (let tri = 0; tri < 2; tri++) {
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * TAU + tri * PI / 3 - t * 0.0006;
        const x = cx + Math.cos(a) * innerR;
        const y = cy + Math.sin(a) * innerR;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }

    ctx.globalAlpha = alpha * 0.15;
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerR * 0.5);
    cg.addColorStop(0, "rgba(176,136,48,0.4)");
    cg.addColorStop(1, "rgba(176,136,48,0)");
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(cx, cy, outerR * 0.5, 0, TAU); ctx.fill();

    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════
  //  渲 染 循 环
  // ═══════════════════════════════════════════════════════
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight - 52 - 140;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    calcMountains();
  }
  window.addEventListener("resize", resize);

  let lastSakura = 0;

  function frame(t) {
    ctx.clearRect(0, 0, W, H);

    // 背景层（AI 底图优先，加载中显示纯色过渡）
    if (!drawBgCover()) {
      ctx.fillStyle = "#d8dcc8";
      ctx.fillRect(0, 0, W, H);
    }

    // 特效层
    drawAchCircle(t);

    // Sprint 7: 推进所有正在融合的角色（必须在角色绘制前算位置）
    updateFusions(t);

    // 角色层
    const now = performance.now();
    for (const [uid, n] of members) {
      if (uid === NPC_UID) continue;
      let alpha = 1;
      if (n.leaving) {
        const k = (now - n.leaving) / 700;
        if (k >= 1) { members.delete(uid); continue; }
        alpha = 1 - k;
      }
      const age = now - n.born;
      let scale = 1, entryY = 0;
      if (age < 700) {
        const k = age / 700;
        scale = 0.3 + 0.7 * easeOutBack(k);
        entryY = (1 - easeOutQuart(k)) * 50;
        alpha *= easeOutQuart(k);
      }
      if (n.pop > 0) { scale *= 1 + 0.12 * n.pop; n.pop = Math.max(0, n.pop - 0.035); }

      const bobY = Math.sin(t * 0.0012 + n.phase * 2) * 3;
      // Sprint 7: 融合演出期间，位置由 updateFusions 接管（忽略 IMU/drift）
      if (n.fusion) {
        // n.x/n.y 已被 updateFusions 改写
        // 融合后期角色淡出（光柱阶段中心点淡入淡出）
        if (n.fusion.phase === "hold") alpha *= 0.4;
        else if (n.fusion.phase === "burst") alpha *= 0.65;
      } else {
        const tiltActive = n.lastTilt && (now - n.lastTilt < 1200);
        if (tiltActive) {
          const speed = 2.0;
          n.x += n.tiltDx * speed;
          n.y += n.tiltDy * speed;
        } else {
          n.x += Math.cos(t * 0.0002 * n.speed + n.phase) * 0.15;
          n.y += Math.sin(t * 0.0003 * n.speed + n.phase * 1.3) * 0.1;
        }
        n.x = Math.max(50, Math.min(W - 50, n.x));
        n.y = Math.max(50, Math.min(H - 50, n.y));
      }
      const wx = n.x;
      const wy = n.y + bobY + entryY;

      drawCharacter(n, wx, wy, scale, alpha, t);
      // Sprint 7: 求偶光环 + 脚下 skill chips
      drawPairAura(n, wx, wy, scale, alpha, t);
      drawKingCrown(n, wx, wy, scale, alpha, t);
      drawSkillChips(n, wx, wy, scale, alpha);

      if (n.bubble && now < n.bubble.until) {
        drawBubble(n.bubble.text, wx, wy - CHAR_SIZE * scale * 0.55, alpha, n.bubble.channel || n.channel);
      } else if (n.bubble) { n.bubble = null; }
    }

    // Sprint 7: 融合演出特效（光柱 / 飞符 / 粒子）在角色层之上
    drawFusionFx(t);

    // NPC + 粒子
    drawNpc(t);
    drawEmoteEffects(t);
    drawJoinBursts(t);

    if (t - lastSakura > 350) { spawnSakura(); lastSakura = t; }
    updateAndDrawSakura(t);
    drawPollen(t);

    requestAnimationFrame(frame);
  }

  //  HUD
  // ═══════════════════════════════════════════════════════
  function updateHud() {
    let realCount = 0;
    const counts = { main: 0, fishing: 0, help: 0 };
    for (const n of members.values()) {
      if (n.uid === NPC_UID) continue;
      realCount++;
      counts[n.channel] = (counts[n.channel] || 0) + 1;
    }
    $("count").textContent = realCount;
    $("msgs").textContent = totalMessages;
    $("empty").classList.toggle("hidden", realCount > 0);
    const CH_LABELS = { main: "#MAIN", fishing: "#FISH", help: "#HELP" };
    for (const ch of CHANNELS) {
      const el = $("ch-" + ch);
      if (!el) continue;
      el.textContent = CH_LABELS[ch] + " " + counts[ch];
      el.classList.toggle("empty", counts[ch] === 0);
    }
  }

  // ═══════════════════════════════════════════════════════
  //  Sprint 7: Skill Fusion choreography（5s 演出）
  // ═══════════════════════════════════════════════════════
  // 飞符 / 粒子 / 光柱状态
  const fusionFx = [];   // {kind:"icon"|"particle"|"beam", ...}
  const pairToast = $("pair-toast");
  let pairToastTimer = null;

  function showPairToast(d) {
    const omni = d.a_omni || d.b_omni;
    const aGain = (d.a_gained || []).map(s => SKILL_EMOJI[s] || s).join("") || "—";
    const bGain = (d.b_gained || []).map(s => SKILL_EMOJI[s] || s).join("") || "—";
    pairToast.querySelector(".pair-pair").innerHTML =
      `${esc(d.a_nick)} <span class="arrow">⇄</span> ${esc(d.b_nick)}`;
    pairToast.querySelector(".pair-gained").innerHTML =
      `${esc(d.a_nick)} +${aGain}<br>${esc(d.b_nick)} +${bGain}`;
    const ult = pairToast.querySelector(".pair-ult");
    const ultMsgs = [];
    if (d.a_ultimates && d.a_ultimates.length) ultMsgs.push(`${esc(d.a_nick)} ⚡ ${d.a_ultimates.join("/")}`);
    if (d.b_ultimates && d.b_ultimates.length) ultMsgs.push(`${esc(d.b_nick)} ⚡ ${d.b_ultimates.join("/")}`);
    if (omni) ultMsgs.push("🌌 OMNISCIENT — all 16 unlocked!");
    ult.innerHTML = ultMsgs.join("<br>");
    pairToast.classList.toggle("omni", omni);
    pairToast.classList.add("show");
    if (pairToastTimer) clearTimeout(pairToastTimer);
    pairToastTimer = setTimeout(() => pairToast.classList.remove("show"), omni ? 7000 : 5000);
  }

  // 收到 pair_fused → 标记双方进 fusion choreography
  function triggerFusion(d) {
    const a = members.get(d.a_uid);
    const b = members.get(d.b_uid);
    if (!a || !b) return;
    // 算中点
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    const start = performance.now();
    a.fusion = {
      start, phase: "approach",
      fromX: a.x, fromY: a.y,
      toX: mx - 30, toY: my,
      midX: mx, midY: my,
      partnerUid: b.uid,
      gained: d.a_gained || [],
      ultimates: d.a_ultimates || [],
      omni: !!d.a_omni,
    };
    b.fusion = {
      start, phase: "approach",
      fromX: b.x, fromY: b.y,
      toX: mx + 30, toY: my,
      midX: mx, midY: my,
      partnerUid: a.uid,
      gained: d.b_gained || [],
      ultimates: d.b_ultimates || [],
      omni: !!d.b_omni,
    };
    a.pairingUntil = 0; b.pairingUntil = 0;
    // 立即更新两人技能/进度 → chip 行实时反映
    if (d.a_progress) a.progress = d.a_progress;
    if (d.b_progress) b.progress = d.b_progress;
    // 计算新 skill 总集合（在事件里没全发，但 gained ∪ 旧 = 现在）
    const aNew = new Set([...(a.skills || []), ...(d.a_gained || [])]);
    const bNew = new Set([...(b.skills || []), ...(d.b_gained || [])]);
    a.skills = Array.from(aNew);
    b.skills = Array.from(bNew);
    if (d.a_omni) a.hasOmni = true;
    if (d.b_omni) b.hasOmni = true;
    if (d.a_ultimates) a.ultimates = Array.from(new Set([...(a.ultimates || []), ...d.a_ultimates]));
    if (d.b_ultimates) b.ultimates = Array.from(new Set([...(b.ultimates || []), ...d.b_ultimates]));
    // A+ 改进: 谁贡献了 starter，谁的 contributedCount +1（用于 📨 徽章）
    // a_gained 非空意味着 B 给了 A，b.contributedCount++
    if ((d.a_gained || []).length > 0) b.contributedCount = (b.contributedCount || 0) + 1;
    if ((d.b_gained || []).length > 0) a.contributedCount = (a.contributedCount || 0) + 1;
  }

  // 每帧推进 fusion 位置 + 阶段
  function updateFusions(t) {
    const now = performance.now();
    for (const n of members.values()) {
      if (!n.fusion) continue;
      const elapsed = now - n.fusion.start;
      if (elapsed < FUSION_APPROACH_MS) {
        n.fusion.phase = "approach";
        const k = easeOutQuart(elapsed / FUSION_APPROACH_MS);
        n.x = n.fusion.fromX + (n.fusion.toX - n.fusion.fromX) * k;
        n.y = n.fusion.fromY + (n.fusion.toY - n.fusion.fromY) * k;
      } else if (elapsed < FUSION_APPROACH_MS + FUSION_HOLD_MS) {
        if (n.fusion.phase !== "hold") {
          n.fusion.phase = "hold";
          // 第一次进 hold → 触发光柱 + 飞符（只触发一次，由 fusion 标记防重）
          if (!n.fusion.fxSpawned) {
            n.fusion.fxSpawned = true;
            spawnFusionFx(n);
          }
        }
        n.x = n.fusion.toX; n.y = n.fusion.toY;
      } else if (elapsed < FUSION_APPROACH_MS + FUSION_HOLD_MS + FUSION_BURST_MS) {
        n.fusion.phase = "burst";
        // 站位停留在重合处
        n.x = n.fusion.toX; n.y = n.fusion.toY;
      } else if (elapsed < FUSION_TOTAL_MS) {
        // release：从中点缓慢漂回稍随机位置
        if (n.fusion.phase !== "release") {
          n.fusion.phase = "release";
          n.fusion.releaseFromX = n.x;
          n.fusion.releaseFromY = n.y;
          n.fusion.releaseToX = n.fusion.midX + (Math.random() - 0.5) * 120;
          n.fusion.releaseToY = n.fusion.midY + (Math.random() - 0.5) * 40;
        }
        const k = (elapsed - FUSION_APPROACH_MS - FUSION_HOLD_MS - FUSION_BURST_MS) / FUSION_RELEASE_MS;
        n.x = n.fusion.releaseFromX + (n.fusion.releaseToX - n.fusion.releaseFromX) * easeOutQuart(k);
        n.y = n.fusion.releaseFromY + (n.fusion.releaseToY - n.fusion.releaseFromY) * easeOutQuart(k);
      } else {
        // 结束
        n.fusion = null;
        n.pop = 1;  // 入场式弹一下
      }
    }
  }

  // 触发飞符 + 光柱 + 粒子
  function spawnFusionFx(n) {
    // 1 个光柱（绑在中点，自然衰减）
    fusionFx.push({
      kind: "beam",
      x: n.fusion.midX, y: n.fusion.midY,
      start: performance.now(),
      life: FUSION_HOLD_MS + FUSION_BURST_MS,
    });
    // 24 粒散落粒子
    for (let i = 0; i < 24; i++) {
      const ang = (i / 24) * TAU;
      fusionFx.push({
        kind: "particle",
        x: n.fusion.midX, y: n.fusion.midY,
        vx: Math.cos(ang) * (1.5 + Math.random() * 2.5),
        vy: Math.sin(ang) * (1.5 + Math.random() * 2.5) - 0.5,
        start: performance.now(),
        life: 1200,
        hue: 290 + Math.random() * 50,  // pink-violet
      });
    }
    // 飞符：把每个 gained skill 的 emoji 从光柱抛物线飞向 partner（双向）
    for (const sk of n.fusion.gained) {
      fusionFx.push({
        kind: "icon",
        emoji: SKILL_EMOJI[sk] || "✦",
        fromX: n.fusion.midX, fromY: n.fusion.midY,
        toX: n.fusion.toX, toY: n.fusion.toY - 40,
        start: performance.now() + Math.random() * 200,  // 错峰
        life: 1100,
      });
    }
  }

  function drawFusionFx(t) {
    const now = performance.now();
    for (let i = fusionFx.length - 1; i >= 0; i--) {
      const fx = fusionFx[i];
      const age = now - fx.start;
      if (age < 0) continue;  // 错峰延后开始
      if (age > fx.life) { fusionFx.splice(i, 1); continue; }
      const k = age / fx.life;
      ctx.save();
      if (fx.kind === "beam") {
        // 旋转光柱：上下贯穿，淡入淡出
        const beamH = 200 + 80 * Math.sin(now * 0.006);
        const alpha = Math.sin(k * Math.PI) * 0.65;
        ctx.globalAlpha = alpha;
        const g = ctx.createLinearGradient(fx.x - 30, 0, fx.x + 30, 0);
        g.addColorStop(0, "rgba(255,180,235,0)");
        g.addColorStop(0.5, "rgba(255,220,255,0.95)");
        g.addColorStop(1, "rgba(220,180,255,0)");
        ctx.fillStyle = g;
        ctx.fillRect(fx.x - 30, fx.y - beamH / 2, 60, beamH);
        // 旋转内核
        ctx.globalAlpha = alpha * 0.7;
        ctx.translate(fx.x, fx.y);
        ctx.rotate(now * 0.005);
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        for (let r = 0; r < 8; r++) {
          const a = (r / 8) * TAU;
          ctx.beginPath();
          ctx.ellipse(Math.cos(a) * 16, Math.sin(a) * 16, 4, 14, a, 0, TAU);
          ctx.fill();
        }
      } else if (fx.kind === "particle") {
        const alpha = (1 - k) * 0.85;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = `hsl(${fx.hue}, 75%, 70%)`;
        const x = fx.x + fx.vx * age * 0.06;
        const y = fx.y + fx.vy * age * 0.06 + 0.0008 * age * age;  // 重力
        ctx.beginPath();
        ctx.arc(x, y, 3 * (1 - k * 0.5), 0, TAU);
        ctx.fill();
      } else if (fx.kind === "icon") {
        // 抛物线：从中点 → partner 头顶
        const x = fx.fromX + (fx.toX - fx.fromX) * k;
        const arc = -Math.sin(k * Math.PI) * 60;   // 拱形
        const y = fx.fromY + (fx.toY - fx.fromY) * k + arc;
        const alpha = Math.sin(Math.min(1, k * 1.4) * Math.PI) * 0.95;
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.font = `${28 + 8 * Math.sin(k * Math.PI)}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(fx.emoji, x, y);
      }
      ctx.restore();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  Vix 问答赛
  // ═══════════════════════════════════════════════════════
  const quizPanel = $("quiz-panel");
  let quizTimerInterval = null;
  let quizStartedAt = 0;
  const QUIZ_TIMEOUT = 20;

  function showQuizPanel() {
    quizPanel.classList.add("show");
  }
  function hideQuizPanel() {
    quizPanel.classList.remove("show");
    if (quizTimerInterval) { clearInterval(quizTimerInterval); quizTimerInterval = null; }
  }
  function setQuizQuestion(round, total, question) {
    quizPanel.querySelector(".quiz-header").textContent = `🎯 Q${round}/${total}`;
    quizPanel.querySelector(".quiz-question").textContent = question;
    quizPanel.querySelector(".quiz-status").textContent = "Use /ans <answer> to answer!";
    quizStartedAt = performance.now();
    if (quizTimerInterval) clearInterval(quizTimerInterval);
    quizTimerInterval = setInterval(() => {
      const elapsed = (performance.now() - quizStartedAt) / 1000;
      const left = Math.max(0, QUIZ_TIMEOUT - elapsed);
      quizPanel.querySelector(".quiz-timer").textContent = `⏱ ${Math.ceil(left)}s`;
      if (left <= 0 && quizTimerInterval) { clearInterval(quizTimerInterval); quizTimerInterval = null; }
    }, 200);
    showQuizPanel();
  }
  function setQuizScores(scores) {
    const el = quizPanel.querySelector(".quiz-scores");
    const medals = ["🥇", "🥈", "🥉"];
    el.innerHTML = (scores || []).map((s, i) =>
      `<div class="score-row"><span class="rank">${medals[i] || (i+1)}</span><span class="name">${esc(s.nick)}</span><span class="pts">${s.score}</span></div>`
    ).join("");
  }

  // ═══════════════════════════════════════════════════════
  //  事 件 处 理
  // ═══════════════════════════════════════════════════════
  function applySnapshot(d) {
    members.clear();
    $("room").textContent = d.room || "hall";
    totalMessages = d.total_messages || 0;
    (d.members || []).forEach(m => {
      const n = spawnNode(m.uid, m.nick);
      n.born = performance.now() - 2000;
      n.channel = m.current_channel || "main";
      n.msgCount = m.msg_count || 0;
      // Sprint 7: 从 snapshot 恢复技能状态
      n.skills = Array.isArray(m.skills) ? m.skills.slice() : [];
      n.ultimates = Array.isArray(m.ultimates) ? m.ultimates.slice() : [];
      n.hasOmni = !!m.has_omni;
      n.progress = Array.isArray(m.progress) ? m.progress.slice() : [n.skills.length, 16];
      // A+ 改进: starter / 贡献排行
      n.starterSkills = Array.isArray(m.starter_skills) ? m.starter_skills.slice() : [];
      n.contributedCount = m.contributed_count || 0;
      if (m.png_b64) {
        const img = new Image();
        img.onload = () => { n.img = img; };
        img.src = "data:image/png;base64," + m.png_b64;
      }
    });
    updateHud();
    if (d.npc_avatar) {
      npcImg = new Image();
      npcImg.src = "data:image/png;base64," + d.npc_avatar;
    }
    pushLog(`<span class="sys">◈</span> Snapshot loaded · Online ${members.size}`);
  }

  function handleEvent(d) {
    switch (d.type) {
      case "snapshot":
        applySnapshot(d);
        break;
      case "join": {
        let n = members.get(d.uid);
        if (!n) n = spawnNode(d.uid, d.nick);
        else { n.nick = d.nick || n.nick; n.leaving = 0; }
        // Sprint 7: 入场带 starter skills
        if (Array.isArray(d.skills)) n.skills = d.skills.slice();
        if (Array.isArray(d.progress)) n.progress = d.progress.slice();
        const wx = n.x + Math.cos(n.phase) * n.drift;
        const wy = n.y + Math.sin(n.phase * 1.3) * n.drift;
        spawnJoinBurst(wx, wy);
        updateHud();
        pushLog(`<span class="nick">${esc(d.nick || d.uid)}</span> arrived`);
        break;
      }
      case "leave": {
        const n = members.get(d.uid);
        if (n) n.leaving = performance.now();
        pushLog(`<span class="nick">${esc(d.nick || d.uid)}</span> left`);
        setTimeout(updateHud, 750);
        break;
      }
      case "msg": {
        if (d.uid === NPC_UID) break;
        totalMessages++;
        const n = members.get(d.uid);
        const ch = d.channel || "main";
        if (n) {
          n.channel = ch;
          n.bubble = { text: d.text, until: performance.now() + 5000, channel: ch };
          n.pop = 1;
          n.msgCount = (n.msgCount || 0) + 1;
        }
        const chTag = ch !== "main" ? `<span class="sys">#${esc(ch)}</span> ` : "";
        pushLog(`${chTag}<span class="nick">${esc(d.nick)}</span>: ${esc(d.text)}`);
        updateHud();
        break;
      }
      case "status":
        break;
      case "achievement": {
        const n = members.get(d.uid);
        if (n) n.pop = 1;
        pushLog(`<span class="sys">★</span> <span class="nick">${esc(d.nick || d.uid)}</span> unlocked "${esc(d.title)}"`);
        showAchievement(d);
        break;
      }
      case "avatar": {
        const n = members.get(d.uid);
        if (n && d.png_b64) {
          n.generating = false;
          const img = new Image();
          img.onload = () => { n.img = img; n.pop = 1; };
          img.src = "data:image/png;base64," + d.png_b64;
          pushLog(`<span class="sys">◈</span> <span class="nick">${esc(d.nick || d.uid)}</span> new look`);
        }
        break;
      }
      case "avatar_generating": {
        const n = members.get(d.uid);
        if (n) n.generating = true;
        pushLog(`<span class="sys">◈</span> <span class="nick">${esc(d.nick || d.uid)}</span> generating avatar…`);
        break;
      }
      case "emote": {
        const EMOTE_LABELS = {
          bloom: "🌸 Bloom", spark: "✨ Spark", wind: "🍃 Wind", fox: "🦊 Foxfire", rain: "🌈 Rainbow",
          leaf: "🍂 Leaf", flame: "🔥 Flame", comet: "☄️ Comet",
          wave: "🌊 Wave", bubble: "🫧 Bubble", mist: "🌫️ Mist", tide: "💧 Tide",
          star: "⭐ Star", aurora: "🌌 Aurora", lightning: "⚡ Lightning", halo: "💫 Halo",
          gaia: "🌍 GAIA", solar: "☀️ SOLAR", dragon: "🐉 DRAGON", galaxy: "🌠 GALAXY",
          omni: "🌌 OMNI",
        };
        spawnEmote(d.uid, d.emote);
        pushLog(`<span class="sys">✦</span> <span class="nick">${esc(d.nick || d.uid)}</span> ${esc(EMOTE_LABELS[d.emote] || d.emote)}`);
        break;
      }
      case "move": {
        const n = members.get(d.uid);
        if (n) {
          n.tiltDx = d.dx || 0;
          n.tiltDy = d.dy || 0;
          n.lastTilt = performance.now();
        }
        break;
      }
      case "npc_ask": {
        npcBubble = { text: d.text, until: performance.now() + 6000, type: "ask", nick: d.nick };
        npcAwake = true; npcAwakeUntil = performance.now() + 12000;
        pushLog(`<span class="sys">❗</span> <span class="nick">${esc(d.nick)}</span> asks Vix: ${esc(d.text)}`);
        break;
      }
      case "npc_reply": {
        npcBubble = { text: d.text, until: performance.now() + 8000, type: "reply", nick: null };
        npcAwake = true; npcAwakeUntil = performance.now() + 12000;
        // 仙灵粒子散落
        const { x: npcX, y: npcY } = getNpcPos(performance.now());
        for (let i = 0; i < 12; i++) {
          pollen.push({
            x: npcX + (Math.random() - 0.5) * 40,
            y: npcY + 10 + Math.random() * 20,
            vx: (Math.random() - 0.5) * 0.6,
            vy: 0.2 + Math.random() * 0.4,
            size: 1 + Math.random() * 2,
            phase: Math.random() * TAU,
            speed: 0.002 + Math.random() * 0.002,
            hue: 40 + Math.random() * 15,
          });
        }
        pushLog(`<span class="sys">✨</span> <span class="nick">Vix</span>: ${esc(d.text)}`);
        break;
      }
      case "task_assign": {
        showTaskScroll(d, false);
        pushLog(`<span class="sys">📜</span> <span class="nick">${esc(d.nick)}</span> took "${esc(d.title)}"`);
        break;
      }
      case "task_complete": {
        showTaskScroll(d, true);
        spawnEmote(d.uid, "ink");
        pushLog(`<span class="sys">🔥</span> <span class="nick">${esc(d.nick)}</span> completed "${esc(d.title)}"`);
        break;
      }
      case "anon_msg": {
        showAnonBubble(d.text);
        pushLog(`<span class="sys">💌</span> <i>anonymous</i>: ${esc(d.text)}`);
        break;
      }
      case "quiz_start": {
        showQuizPanel();
        quizPanel.querySelector(".quiz-question").textContent = "Get ready...";
        quizPanel.querySelector(".quiz-status").textContent = `${esc(d.nick)} started a ${d.rounds}-round quiz!`;
        setQuizScores([]);
        pushLog(`<span class="sys">🎯</span> <span class="nick">${esc(d.nick)}</span> started a quiz!`);
        break;
      }
      case "quiz_question": {
        setQuizQuestion(d.round, d.total, d.question);
        pushLog(`<span class="sys">📝</span> Q${d.round}: ${esc(d.question)}`);
        break;
      }
      case "quiz_hint": {
        quizPanel.querySelector(".quiz-status").textContent = `💡 Hint: ${d.hint}`;
        pushLog(`<span class="sys">💡</span> Hint: ${esc(d.hint)}`);
        break;
      }
      case "quiz_correct": {
        if (quizTimerInterval) { clearInterval(quizTimerInterval); quizTimerInterval = null; }
        quizPanel.querySelector(".quiz-timer").textContent = "";
        quizPanel.querySelector(".quiz-status").textContent = `🎉 ${d.nick} got it in ${d.elapsed}s!`;
        setQuizScores(d.scores || []);
        spawnEmote(d.uid, "spark");
        pushLog(`<span class="sys">🎉</span> <span class="nick">${esc(d.nick)}</span> answered correctly! (${d.elapsed}s)`);
        break;
      }
      case "quiz_wrong": {
        pushLog(`<span class="sys">❌</span> <span class="nick">${esc(d.nick)}</span> wrong answer`);
        break;
      }
      case "quiz_timeout": {
        if (quizTimerInterval) { clearInterval(quizTimerInterval); quizTimerInterval = null; }
        quizPanel.querySelector(".quiz-timer").textContent = "";
        quizPanel.querySelector(".quiz-status").textContent = `⏰ Time's up! Answer: ${d.answer}`;
        pushLog(`<span class="sys">⏰</span> Time's up! Answer: ${esc(d.answer)}`);
        break;
      }
      case "quiz_end": {
        if (quizTimerInterval) { clearInterval(quizTimerInterval); quizTimerInterval = null; }
        setQuizScores(d.scores || []);
        const winner = (d.scores || [])[0];
        quizPanel.querySelector(".quiz-header").textContent = "🏆 Quiz Over!";
        quizPanel.querySelector(".quiz-question").textContent = winner ? `Winner: ${winner.nick} (${winner.score}pts)` : "No one scored!";
        quizPanel.querySelector(".quiz-timer").textContent = "";
        quizPanel.querySelector(".quiz-status").textContent = "Use /quiz to start another!";
        pushLog(`<span class="sys">🏆</span> Quiz ended!` + (winner ? ` Winner: <span class="nick">${esc(winner.nick)}</span>` : ""));
        // 8s 后自动隐藏计分板
        setTimeout(hideQuizPanel, 8000);
        break;
      }
      // Sprint 7: 双机配对意向 → 头顶 ❤️ + 心圈
      case "pair_intent": {
        const n = members.get(d.uid);
        if (n) {
          n.pairingUntil = performance.now() + (d.window_s ? d.window_s * 1000 : PAIR_WINDOW_MS);
        }
        pushLog(`<span class="sys">💗</span> <span class="nick">${esc(d.nick || d.uid)}</span> wants to pair…`);
        break;
      }
      // Sprint 7: 配对成功 → 5s 融合演出 + 顶部 toast
      case "pair_fused": {
        triggerFusion(d);
        showPairToast(d);
        const aGain = (d.a_gained || []).length;
        const bGain = (d.b_gained || []).length;
        const ultMsg = ((d.a_ultimates || []).concat(d.b_ultimates || []).length) ? " · ⚡ ULT!" : "";
        const omniMsg = (d.a_omni || d.b_omni) ? " · 🌌 OMNISCIENT!" : "";
        pushLog(`<span class="sys">⇄</span> <span class="nick">${esc(d.a_nick)}</span> ⇄ <span class="nick">${esc(d.b_nick)}</span> fused (+${aGain}/+${bGain})${ultMsg}${omniMsg}`);
        // Sprint 7 Phase 7.3: fusion 5s 演出完后自动放大招/omni
        const ultimateMap = { nature: "gaia", fire: "solar", water: "dragon", light: "galaxy" };
        const delayMs = FUSION_TOTAL_MS + 300;
        const fireUlt = (uid, elements) => {
          for (const el of elements || []) {
            const sk = ultimateMap[el];
            if (sk) setTimeout(() => spawnEmote(uid, sk), delayMs);
          }
        };
        fireUlt(d.a_uid, d.a_ultimates);
        fireUlt(d.b_uid, d.b_ultimates);
        if (d.a_omni) setTimeout(() => spawnEmote(d.a_uid, "omni"), delayMs);
        if (d.b_omni) setTimeout(() => spawnEmote(d.b_uid, "omni"), delayMs);
        break;
      }
      case "ping":
        break;
    }
  }

  // ═══════════════════════════════════════════════════════
  //  WebSocket
  // ═══════════════════════════════════════════════════════
  const connEl = $("conn");
  let ws = null, retry = 0, retryTimer = null;

  function wsURL() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    return `${proto}//${location.host}/ws`;
  }

  function connect() {
    setConn("bad", "connecting…");
    ws = new WebSocket(wsURL());
    ws.onopen = () => {
      retry = 0;
      setConn("ok", "connected");
      pushLog(`<span class="sys">◈</span> Connected · LOITER`);
    };
    ws.onmessage = ev => {
      try { handleEvent(JSON.parse(ev.data)); } catch (e) { /* ignore */ }
    };
    ws.onclose = () => {
      setConn("bad", "reconnecting…");
      scheduleReconnect();
    };
    ws.onerror = () => { try { ws.close(); } catch (e) {} };
  }

  function scheduleReconnect() {
    if (retryTimer) return;
    const delay = Math.min(1000 * Math.pow(1.6, retry), 8000);
    retry++;
    retryTimer = setTimeout(() => { retryTimer = null; connect(); }, delay);
  }

  function setConn(cls, text) {
    connEl.className = cls;
    connEl.textContent = text;
  }

  // ═══════════════════════════════════════════════════════
  //  启 动
  // ═══════════════════════════════════════════════════════
  resize();
  initPollen();
  initWisps();
  updateHud();
  requestAnimationFrame(frame);
  connect();
})();
</script>
