<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOITER · 卡片机社交厅</title>
<style>
  :root {
    --bg: #060a06;
    --green: #33ff77;
    --green-dim: #1c7a3e;
    --green-faint: #0d3a1f;
    --amber: #ffcc44;
    --pink: #ff5f9e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  body {
    font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
    color: var(--green);
    -webkit-font-smoothing: none;
  }

  /* ---- 顶部状态栏 ---- */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    display: flex; align-items: center; gap: 24px;
    padding: 0 20px;
    border-bottom: 1px solid var(--green-faint);
    background: rgba(6, 12, 8, 0.85);
    z-index: 10;
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(51, 255, 119, 0.5);
  }
  #topbar .brand { font-weight: bold; font-size: 18px; }
  #topbar .brand .blink { animation: blink 1.1s steps(1) infinite; }
  #topbar .stat { font-size: 13px; color: var(--green-dim); }
  #topbar .stat b { color: var(--green); font-size: 15px; }
  #topbar .spacer { flex: 1; }
  #conn { font-size: 12px; padding: 3px 10px; border: 1px solid var(--green-dim); border-radius: 3px; }
  #conn.ok { color: var(--green); border-color: var(--green-dim); }
  #conn.bad { color: var(--amber); border-color: var(--amber); animation: blink 0.8s steps(1) infinite; }

  /* ---- 主画布 ---- */
  #hall { position: fixed; top: 48px; left: 0; right: 0; bottom: 120px; display: block; }

  /* ---- 底部终端日志 ---- */
  #log {
    position: fixed; left: 0; right: 0; bottom: 0; height: 120px;
    padding: 8px 16px;
    border-top: 1px solid var(--green-faint);
    background: rgba(4, 8, 5, 0.92);
    font-size: 12.5px; line-height: 1.5;
    overflow: hidden;
    z-index: 10;
  }
  #log .line { white-space: nowrap; opacity: 0.92; }
  #log .ts { color: var(--green-faint); }
  #log .nick { color: var(--amber); }
  #log .sys { color: var(--pink); }
  #log .you { color: var(--green); }

  /* ---- CRT 扫描线 + 暗角 ---- */
  #crt {
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background:
      repeating-linear-gradient(
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 3px
      ),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* ---- 空厅提示 ---- */
  #empty {
    position: fixed; inset: 48px 0 120px 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    color: var(--green-dim); z-index: 5;
    text-align: center; letter-spacing: 1px;
    transition: opacity 0.4s;
  }
  #empty .big { font-size: 22px; color: var(--green); text-shadow: 0 0 10px rgba(51,255,119,0.4); }
  #empty.hidden { opacity: 0; pointer-events: none; }

  /* ---- 成就 toast ---- */
  #ach {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
    z-index: 60; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 28px 44px;
    background: rgba(8, 16, 10, 0.94);
    border: 2px solid var(--amber);
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(255, 204, 68, 0.45), inset 0 0 24px rgba(255, 204, 68, 0.12);
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    text-align: center;
  }
  #ach.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #ach .emoji { font-size: 56px; line-height: 1; filter: drop-shadow(0 0 12px rgba(255,204,68,0.6)); }
  #ach .label { font-size: 12px; letter-spacing: 4px; color: var(--amber); }
  #ach .title { font-size: 26px; color: var(--green); text-shadow: 0 0 12px rgba(51,255,119,0.5); }
  #ach .who   { font-size: 13px; color: var(--green-dim); }
  #ach .desc  { font-size: 13px; color: var(--green-dim); }
</style>
</head>
<body>
  <div id="topbar">
    <span class="brand">▌LOITER<span class="blink">_</span></span>
    <span class="stat">ROOM <b id="room">hall</b></span>
    <span class="stat">在线 <b id="count">0</b></span>
    <span class="stat">消息 <b id="msgs">0</b></span>
    <span class="spacer"></span>
    <span id="conn" class="bad">CONNECTING…</span>
  </div>

  <canvas id="hall"></canvas>

  <div id="empty">
    <div class="big">▖▘ 空空如也 ▝▗</div>
    <div>等待第一台 Cardputer 接入…</div>
  </div>

  <div id="log"></div>
  <div id="crt"></div>

  <div id="ach">
    <div class="emoji"></div>
    <div class="label">ACHIEVEMENT UNLOCKED</div>
    <div class="title"></div>
    <div class="who"></div>
    <div class="desc"></div>
  </div>

<script>
(() => {
  "use strict";

  // ===================== 工具 =====================
  const $ = (id) => document.getElementById(id);
  const canvas = $("hall");
  const ctx = canvas.getContext("2d");

  function hashStr(s) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    return h >>> 0;
  }
  function mulberry32(seed) {
    return function () {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // 从 uid 生成确定性的 5x5 对称像素头像 + 主色
  function makeAvatar(uid) {
    const seed = hashStr(uid);
    const rnd = mulberry32(seed);
    const hue = Math.floor(rnd() * 360);
    const color = `hsl(${hue}, 85%, 62%)`;
    const glow = `hsl(${hue}, 90%, 70%)`;
    const grid = [];
    for (let y = 0; y < 5; y++) {
      const row = [0, 0, 0, 0, 0];
      for (let x = 0; x < 3; x++) {
        const on = rnd() > 0.5 ? 1 : 0;
        row[x] = on;
        row[4 - x] = on; // 左右镜像
      }
      grid.push(row);
    }
    return { grid, color, glow, hue };
  }

  function drawAvatar(av, cx, cy, cell, alpha) {
    const size = 5 * cell;
    const ox = cx - size / 2;
    const oy = cy - size / 2;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = av.glow;
    ctx.shadowBlur = 8;
    ctx.fillStyle = av.color;
    for (let y = 0; y < 5; y++) {
      for (let x = 0; x < 5; x++) {
        if (av.grid[y][x]) ctx.fillRect(ox + x * cell, oy + y * cell, cell - 1, cell - 1);
      }
    }
    ctx.restore();
  }

  // AI 头像：把下发的 PNG 画成圆角方块 + 发光边
  function drawImageAvatar(n, cx, cy, cell, alpha) {
    const size = 5 * cell;
    const ox = cx - size / 2;
    const oy = cy - size / 2;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = n.av.glow;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    roundRect(ox, oy, size, size, Math.max(3, cell));
    ctx.clip();
    ctx.drawImage(n.img, ox, oy, size, size);
    ctx.restore();
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = n.av.color;
    ctx.lineWidth = 1.5;
    roundRect(ox, oy, size, size, Math.max(3, cell));
    ctx.stroke();
    ctx.restore();
  }

  // ===================== 状态 =====================
  const members = new Map(); // uid -> node
  let totalMessages = 0;
  let W = 0, H = 0;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight - 48 - 120;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", resize);

  function spawnNode(uid, nick) {
    const seed = hashStr(uid);
    const rnd = mulberry32(seed ^ 0x9e3779b9);
    const node = {
      uid, nick: nick || uid.slice(0, 6),
      av: makeAvatar(uid),
      x: 80 + rnd() * Math.max(1, W - 160),
      y: 80 + rnd() * Math.max(1, H - 160),
      phase: rnd() * Math.PI * 2,
      speed: 0.15 + rnd() * 0.25,
      drift: 18 + rnd() * 22,
      born: performance.now(),
      leaving: 0,
      bubble: null, // {text, until}
      pop: 0,
    };
    members.set(uid, node);
    return node;
  }

  // ===================== 渲染循环 =====================
  function frame(t) {
    ctx.clearRect(0, 0, W, H);

    // 背景网格点（终端栅格感）
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = "#33ff77";
    for (let gx = 20; gx < W; gx += 40) {
      for (let gy = 20; gy < H; gy += 40) ctx.fillRect(gx, gy, 1, 1);
    }
    ctx.restore();

    const now = performance.now();
    for (const [uid, n] of members) {
      // 离场淡出
      let alpha = 1;
      if (n.leaving) {
        const k = (now - n.leaving) / 600;
        if (k >= 1) { members.delete(uid); continue; }
        alpha = 1 - k;
      }
      // 入场弹出
      const age = now - n.born;
      let cell = 8;
      if (age < 400) {
        const k = age / 400;
        cell = 8 * (0.3 + 0.7 * easeOutBack(k));
      }
      if (n.pop > 0) {
        cell *= 1 + 0.25 * n.pop;
        n.pop = Math.max(0, n.pop - 0.05);
      }

      // 闲逛漂移
      const wx = n.x + Math.cos(t * 0.0004 * n.speed + n.phase) * n.drift;
      const wy = n.y + Math.sin(t * 0.0005 * n.speed + n.phase * 1.3) * n.drift;

      if (n.img && n.img.complete && n.img.naturalWidth) {
        drawImageAvatar(n, wx, wy, cell, alpha);
      } else {
        drawAvatar(n.av, wx, wy, cell, alpha);
      }

      // 昵称
      ctx.save();
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = n.av.color;
      ctx.font = "12px monospace";
      ctx.textAlign = "center";
      ctx.fillText(n.nick, wx, wy + 5 * cell / 2 + 16);
      ctx.restore();

      // 聊天气泡
      if (n.bubble && now < n.bubble.until) {
        drawBubble(n.bubble.text, wx, wy - 5 * cell / 2 - 10, alpha);
      } else if (n.bubble) {
        n.bubble = null;
      }
    }

    requestAnimationFrame(frame);
  }

  function easeOutBack(x) {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
  }

  function drawBubble(text, cx, cy, alpha) {
    const t = text.length > 36 ? text.slice(0, 35) + "…" : text;
    ctx.save();
    ctx.font = "13px monospace";
    const w = ctx.measureText(t).width + 16;
    const h = 24;
    const x = cx - w / 2, y = cy - h;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "rgba(8, 20, 12, 0.92)";
    ctx.strokeStyle = "#33ff77";
    ctx.lineWidth = 1;
    roundRect(x, y, w, h, 4);
    ctx.fill(); ctx.stroke();
    // 小尾巴
    ctx.beginPath();
    ctx.moveTo(cx - 5, y + h);
    ctx.lineTo(cx + 5, y + h);
    ctx.lineTo(cx, y + h + 6);
    ctx.closePath();
    ctx.fillStyle = "rgba(8, 20, 12, 0.92)";
    ctx.fill();
    ctx.fillStyle = "#aaffcc";
    ctx.textAlign = "center";
    ctx.fillText(t, cx, y + 16);
    ctx.restore();
  }
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ===================== 终端日志 =====================
  const logEl = $("log");
  const MAX_LOG = 7;
  function pushLog(html) {
    const div = document.createElement("div");
    div.className = "line";
    const ts = new Date().toLocaleTimeString("zh-CN", { hour12: false });
    div.innerHTML = `<span class="ts">[${ts}]</span> ${html}`;
    logEl.appendChild(div);
    while (logEl.children.length > MAX_LOG) logEl.removeChild(logEl.firstChild);
  }
  const esc = (s) => String(s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  // ===================== HUD =====================
  function updateHud() {
    $("count").textContent = members.size;
    $("msgs").textContent = totalMessages;
    $("empty").classList.toggle("hidden", members.size > 0);
  }

  // ===================== 事件处理 =====================
  function applySnapshot(d) {
    members.clear();
    $("room").textContent = d.room || "hall";
    totalMessages = d.total_messages || 0;
    (d.members || []).forEach((m) => {
      const n = spawnNode(m.uid, m.nick);
      n.born = performance.now() - 1000; // 已在场的不弹出
      if (m.png_b64) { // 重连后从快照恢复 AI 头像，不必重新生成
        const img = new Image();
        img.onload = () => { n.img = img; };
        img.src = "data:image/png;base64," + m.png_b64;
      }
    });
    updateHud();
    pushLog(`<span class="sys">系统</span> 快照载入 · 在线 ${members.size}`);
  }

  function handleEvent(d) {
    switch (d.type) {
      case "snapshot":
        applySnapshot(d);
        break;
      case "join": {
        let n = members.get(d.uid);
        if (!n) n = spawnNode(d.uid, d.nick);
        else { n.nick = d.nick || n.nick; n.leaving = 0; }
        updateHud();
        pushLog(`<span class="nick">${esc(d.nick || d.uid)}</span> 进入了房间 →`);
        break;
      }
      case "leave": {
        const n = members.get(d.uid);
        if (n) n.leaving = performance.now();
        pushLog(`<span class="nick">${esc(d.nick || d.uid)}</span> 离开了 ←`);
        // 延迟刷新计数（等淡出）
        setTimeout(updateHud, 650);
        break;
      }
      case "msg": {
        totalMessages++;
        const n = members.get(d.uid);
        if (n) {
          n.bubble = { text: d.text, until: performance.now() + 5000 };
          n.pop = 1;
        }
        const ch = d.channel && d.channel !== "main" ? `<span class="sys">#${esc(d.channel)}</span> ` : "";
        pushLog(`${ch}<span class="nick">${esc(d.nick)}</span>: ${esc(d.text)}`);
        updateHud();
        break;
      }
      case "status":
        // 心跳：仅用于校准计数（以快照/join/leave 为准，这里不强改）
        break;
      case "achievement": {
        const n = members.get(d.uid);
        if (n) n.pop = 1;
        pushLog(`<span class="sys">★ 成就</span> <span class="nick">${esc(d.nick || d.uid)}</span> 解锁「${esc(d.title)}」`);
        showAchievement(d);
        break;
      }
      case "avatar": {
        const n = members.get(d.uid);
        if (n && d.png_b64) {
          const img = new Image();
          img.onload = () => { n.img = img; n.pop = 1; };
          img.src = "data:image/png;base64," + d.png_b64;
          pushLog(`<span class="sys">◈ 头像</span> <span class="nick">${esc(d.nick || d.uid)}</span> 点亮了新脸`);
        }
        break;
      }
    }
  }

  // ===================== 成就 toast =====================
  let achTimer = null;
  function showAchievement(d) {
    const box = $("ach");
    box.querySelector(".emoji").textContent = d.emoji || "★";
    box.querySelector(".title").textContent = d.title || "";
    box.querySelector(".who").textContent = (d.nick || d.uid) + " — 点亮成就";
    box.querySelector(".desc").textContent = d.desc || "";
    box.classList.add("show");
    if (achTimer) clearTimeout(achTimer);
    achTimer = setTimeout(() => box.classList.remove("show"), 3800);
  }

  // ===================== WebSocket =====================
  const conn = $("conn");
  let ws = null, retry = 0, retryTimer = null;

  function wsURL() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    return `${proto}//${location.host}/ws`;
  }

  function connect() {
    setConn("bad", "CONNECTING…");
    ws = new WebSocket(wsURL());
    ws.onopen = () => {
      retry = 0;
      setConn("ok", "CONNECTED");
      pushLog(`<span class="sys">系统</span> 已连接 Hub`);
    };
    ws.onmessage = (ev) => {
      try { handleEvent(JSON.parse(ev.data)); }
      catch (e) { /* ignore */ }
    };
    ws.onclose = () => {
      setConn("bad", "RECONNECTING…");
      scheduleReconnect();
    };
    ws.onerror = () => { try { ws.close(); } catch (e) {} };
  }

  function scheduleReconnect() {
    if (retryTimer) return;
    const delay = Math.min(1000 * Math.pow(1.6, retry), 8000);
    retry++;
    retryTimer = setTimeout(() => { retryTimer = null; connect(); }, delay);
  }

  function setConn(cls, text) {
    conn.className = cls;
    conn.textContent = text;
  }

  // ===================== 启动 =====================
  resize();
  updateHud();
  requestAnimationFrame(frame);
  connect();
})();
</script>
</body>
</html>
