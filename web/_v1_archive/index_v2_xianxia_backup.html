<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOITER · 社交厅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void:    #030510;
    --bg-indigo:  #0a0818;
    --gold:       #c9a961;
    --gold-bright:#f0d68a;
    --gold-dim:   rgba(201,169,97,0.12);
    --crimson:    #c04040;
    --purple:     #7c5cbf;
    --teal:       #45b7a0;
    --moon:       #e8dfc8;
    --parchment:  #d8cdb8;
    --fg:         #e0dac8;
    --fg-dim:     #7a7060;
    --ink:        #1a1420;
    --ch-main:    #c9a961;
    --ch-fishing: #45b7a0;
    --ch-help:    #7c5cbf;
    --font-brush: 'Ma Shan Zheng', cursive;
    --font-serif: 'Noto Serif SC', 'Georgia', serif;
    --font-body:  'Noto Sans SC', -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-void); }
  body { font-family: var(--font-body); color: var(--fg); -webkit-font-smoothing: antialiased; }

  /* ═══ 顶栏 · 漆木横梁 ═══ */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; gap: 20px;
    padding: 0 24px;
    background: linear-gradient(180deg, #12080a 0%, #0a0508 60%, #080406 100%);
    border-bottom: 1px solid var(--gold-dim);
    z-index: 10;
  }
  #topbar::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1.5px;
    background: linear-gradient(90deg, transparent 5%, var(--gold) 30%, var(--gold-bright) 50%, var(--gold) 70%, transparent 95%);
    opacity: 0.6;
  }
  #topbar::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 10%, rgba(201,169,97,0.15) 50%, transparent 90%);
  }
  .brand {
    font-family: var(--font-brush); font-size: 28px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,169,97,0.4), 0 2px 8px rgba(0,0,0,0.6);
    letter-spacing: 0.15em;
    user-select: none;
  }
  .brand-sub {
    font-family: var(--font-serif); font-size: 11px;
    color: var(--fg-dim); letter-spacing: 0.3em;
    margin-left: -4px;
  }
  .stat { font-family: var(--font-serif); font-size: 13px; color: var(--fg-dim); letter-spacing: 1px; }
  .stat b { color: var(--parchment); font-weight: 600; }
  .chan {
    font-family: var(--font-serif); font-size: 11px;
    padding: 3px 14px; border-radius: 3px;
    letter-spacing: 0.12em;
    border: 1px solid transparent;
    transition: all 0.3s;
  }
  .chan.main    { color: var(--ch-main);    border-color: rgba(201,169,97,0.25); }
  .chan.fishing { color: var(--ch-fishing); border-color: rgba(69,183,160,0.25); }
  .chan.help    { color: var(--ch-help);    border-color: rgba(124,92,191,0.25); }
  .chan.empty   { opacity: 0.25; }
  .spacer { flex: 1; }
  #conn {
    font-family: var(--font-serif); font-size: 11px;
    padding: 3px 12px; border-radius: 3px;
    letter-spacing: 1px;
  }
  #conn.ok  { color: var(--gold); border: 1px solid rgba(201,169,97,0.3); }
  #conn.bad { color: var(--crimson); border: 1px solid rgba(192,64,64,0.3); animation: pulse-red 1.5s ease infinite; }
  @keyframes pulse-red { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ═══ 主画布 ═══ */
  #hall {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 140px;
    display: block; z-index: 2; background: transparent;
  }

  /* ═══ 底部 · 竹简日志 ═══ */
  #log {
    position: fixed; left: 0; right: 0; bottom: 0; height: 140px;
    padding: 14px 24px 12px;
    background: linear-gradient(180deg, rgba(12,8,6,0.92) 0%, rgba(6,4,3,0.97) 100%);
    border-top: 1px solid var(--gold-dim);
    font-family: var(--font-serif); font-size: 13px; line-height: 1.7;
    overflow: hidden; z-index: 10;
  }
  #log::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 10%, rgba(201,169,97,0.12) 50%, transparent 90%);
  }
  #log .line { white-space: nowrap; opacity: 0; animation: log-in 0.4s ease forwards; }
  @keyframes log-in { to { opacity: 0.88; } }
  #log .ts   { color: rgba(122,112,96,0.35); }
  #log .nick { color: var(--gold); }
  #log .sys  { color: var(--purple); }

  /* ═══ 空厅 ═══ */
  #empty {
    position: fixed; inset: 52px 0 140px 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    z-index: 5; pointer-events: none;
    transition: opacity 0.6s;
  }
  #empty .glyph {
    font-family: var(--font-brush); font-size: 48px;
    color: var(--gold); opacity: 0.4;
    animation: float 4s ease-in-out infinite;
  }
  #empty .hint {
    font-family: var(--font-serif); font-size: 14px;
    color: var(--fg-dim); letter-spacing: 0.3em;
  }
  #empty.hidden { opacity: 0; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  /* ═══ 成就 · 法阵召唤 ═══ */
  #ach-overlay {
    position: fixed; inset: 0; z-index: 58;
    background: rgba(3,5,16,0); pointer-events: none;
    transition: background 0.5s;
  }
  #ach-overlay.show { background: rgba(3,5,16,0.5); }
  #ach {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7);
    z-index: 60; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 32px 52px;
    background: linear-gradient(180deg, rgba(16,10,8,0.95) 0%, rgba(8,5,4,0.98) 100%);
    border: 1px solid rgba(201,169,97,0.2);
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(201,169,97,0.15), 0 0 120px rgba(201,169,97,0.05);
    opacity: 0; transition: opacity 0.5s, transform 0.5s;
    text-align: center;
  }
  #ach.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #ach .emoji { font-size: 52px; line-height: 1; filter: drop-shadow(0 0 12px rgba(201,169,97,0.5)); }
  #ach .label {
    font-family: var(--font-serif); font-size: 11px;
    letter-spacing: 0.5em; color: var(--gold); opacity: 0.7;
  }
  #ach .title {
    font-family: var(--font-brush); font-size: 32px;
    color: var(--gold-bright);
    text-shadow: 0 0 20px rgba(201,169,97,0.5);
  }
  #ach .who  { font-family: var(--font-serif); font-size: 13px; color: var(--fg-dim); }
  #ach .desc { font-family: var(--font-serif); font-size: 12px; color: var(--fg-dim); opacity: 0.7; }

  /* ═══ 破冰卷轴 ═══ */
  #task-scroll {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
    z-index: 55; pointer-events: none;
    width: 300px; padding: 28px 36px;
    background: linear-gradient(180deg, rgba(16,10,8,0.95) 0%, rgba(8,5,4,0.98) 100%);
    border: 1px solid rgba(201,169,97,0.15);
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(201,169,97,0.1);
    opacity: 0; transition: opacity 0.5s, transform 0.5s;
    text-align: center;
  }
  #task-scroll.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #task-scroll.burn {
    opacity: 0; transform: translate(-50%, -50%) scale(1.15);
    filter: brightness(1.8) sepia(0.6);
    transition: all 0.7s;
  }
  #task-scroll .scroll-ornament {
    font-family: var(--font-serif); font-size: 10px;
    letter-spacing: 0.6em; color: var(--gold); opacity: 0.3;
  }
  #task-scroll .task-who {
    font-family: var(--font-serif); font-size: 13px;
    color: var(--fg-dim); margin: 8px 0 2px;
  }
  #task-scroll .task-title {
    font-family: var(--font-brush); font-size: 26px;
    color: var(--gold-bright);
    text-shadow: 0 0 12px rgba(201,169,97,0.3);
  }
  #task-scroll .task-desc {
    font-family: var(--font-serif); font-size: 13px;
    color: var(--fg-dim); margin-top: 4px;
  }
  #task-scroll .task-done {
    font-size: 28px; margin-top: 8px; display: none;
    filter: drop-shadow(0 0 8px rgba(201,169,97,0.5));
  }
  #task-scroll.complete .task-done { display: block; }

  /* ═══ 暗角 ═══ */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(3,5,16,0.45) 100%);
  }
</style>
</head>
<body>

<div id="topbar">
  <span class="brand">闲逛堂</span>
  <span class="brand-sub">LOITER</span>
  <span class="stat">室 <b id="room">hall</b></span>
  <span class="stat">在线 <b id="count">0</b></span>
  <span class="stat">言 <b id="msgs">0</b></span>
  <span class="chan main empty"    id="ch-main">#主厅 0</span>
  <span class="chan fishing empty" id="ch-fishing">#摸鱼 0</span>
  <span class="chan help empty"    id="ch-help">#求助 0</span>
  <span class="spacer"></span>
  <span id="conn" class="bad">连接中…</span>
</div>

<canvas id="hall"></canvas>

<div id="empty">
  <div class="glyph">待</div>
  <div class="hint">静 候 · 第 一 位 降 临 者</div>
</div>

<div id="log"></div>
<div id="vignette"></div>

<div id="ach-overlay"></div>
<div id="ach">
  <div class="emoji"></div>
  <div class="label">成 就 觉 醒</div>
  <div class="title"></div>
  <div class="who"></div>
  <div class="desc"></div>
</div>

<div id="task-scroll">
  <div class="scroll-ornament">── 卷 轴 ──</div>
  <div class="task-who"></div>
  <div class="task-title"></div>
  <div class="task-desc"></div>
  <div class="task-done">✅</div>
  <div class="scroll-ornament">─────────</div>
</div>

<script>
(() => {
  "use strict";

  // ═══════════════════════════════════════════════════════
  //  工 具
  // ═══════════════════════════════════════════════════════
  const $ = id => document.getElementById(id);
  const canvas = $("hall");
  const ctx = canvas.getContext("2d");
  const PI = Math.PI, TAU = PI * 2;

  function hashStr(s) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
    return h >>> 0;
  }
  function mulberry32(seed) {
    return () => { seed |= 0; seed = (seed + 0x6D2B79F5) | 0; let t = Math.imul(seed ^ (seed >>> 15), 1 | seed); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
  }
  function easeOutBack(x) { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2); }
  function easeOutQuart(x) { return 1 - Math.pow(1 - x, 4); }
  const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c]);

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ═══════════════════════════════════════════════════════
  //  常 量
  // ═══════════════════════════════════════════════════════
  const GOLD = "#c9a961", GOLD_B = "#f0d68a", CRIMSON = "#c04040";
  const PURPLE = "#7c5cbf", TEAL = "#45b7a0";
  const CHANNELS = ["main", "fishing", "help"];
  const CHAN_COLORS = {
    main:    { stroke: GOLD,   glow: "rgba(201,169,97,0.3)",  fill: "rgba(12,8,6,0.92)" },
    fishing: { stroke: TEAL,   glow: "rgba(69,183,160,0.3)",  fill: "rgba(6,12,10,0.92)" },
    help:    { stroke: PURPLE, glow: "rgba(124,92,191,0.3)",   fill: "rgba(10,6,14,0.92)" },
  };
  const chanColor = ch => CHAN_COLORS[ch] || CHAN_COLORS.main;

  const RARITY = [
    { min: 0,  tier: 0, border: "#4a4a55", glow: "rgba(74,74,85,0.2)",    width: 1   },
    { min: 5,  tier: 1, border: "#4a7fff", glow: "rgba(74,127,255,0.35)",  width: 1.5 },
    { min: 15, tier: 2, border: "#a855f7", glow: "rgba(168,85,247,0.4)",   width: 2   },
    { min: 30, tier: 3, border: GOLD,      glow: "rgba(201,169,97,0.5)",   width: 2.5 },
  ];
  function getRarity(n) {
    for (let i = RARITY.length - 1; i >= 0; i--) { if ((n || 0) >= RARITY[i].min) return RARITY[i]; }
    return RARITY[0];
  }

  const NPC_UID = "npc-yueling";
  const NPC_NICK = "月灵";

  // ═══════════════════════════════════════════════════════
  //  状 态
  // ═══════════════════════════════════════════════════════
  const members = new Map();
  let totalMessages = 0;
  let W = 0, H = 0;
  let npcBubble = null;
  let npcImg = null;
  let achEffect = null;
  const sakuraPetals = [];
  const fireflies = [];
  const mistBlobs = [];
  const emoteEffects = [];
  const joinBursts = [];

  // ═══════════════════════════════════════════════════════
  //  背 景 · 天 空 / 月 / 山
  // ═══════════════════════════════════════════════════════
  const stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random(), y: Math.random() * 0.6,
      size: 0.4 + Math.random() * 1.6,
      alpha: 0.15 + Math.random() * 0.5,
      speed: 0.0005 + Math.random() * 0.002,
      phase: Math.random() * TAU,
      warm: Math.random() > 0.7,
    });
  }

  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0,   "#030510");
    g.addColorStop(0.4, "#070714");
    g.addColorStop(0.7, "#0a0818");
    g.addColorStop(1,   "#0c0a10");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawStars(t) {
    for (const s of stars) {
      const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.globalAlpha = s.alpha * twinkle;
      ctx.fillStyle = s.warm ? "#ffe8c0" : "#c8d8f0";
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.size, 0, TAU);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawMoon(t) {
    const mx = W * 0.80, my = H * 0.13;
    const r = Math.min(W, H) * 0.07;
    const pulse = 1 + 0.03 * Math.sin(t * 0.0003);

    ctx.save();
    // 大光晕
    const g0 = ctx.createRadialGradient(mx, my, 0, mx, my, r * 6 * pulse);
    g0.addColorStop(0, "rgba(232,223,200,0.06)");
    g0.addColorStop(0.4, "rgba(232,223,200,0.02)");
    g0.addColorStop(1, "rgba(232,223,200,0)");
    ctx.fillStyle = g0;
    ctx.beginPath(); ctx.arc(mx, my, r * 6, 0, TAU); ctx.fill();

    // 内光晕
    const g1 = ctx.createRadialGradient(mx, my, r * 0.5, mx, my, r * 2.5 * pulse);
    g1.addColorStop(0, "rgba(232,223,200,0.18)");
    g1.addColorStop(0.5, "rgba(232,223,200,0.04)");
    g1.addColorStop(1, "rgba(232,223,200,0)");
    ctx.fillStyle = g1;
    ctx.beginPath(); ctx.arc(mx, my, r * 2.5, 0, TAU); ctx.fill();

    // 月体
    const g2 = ctx.createRadialGradient(mx - r * 0.25, my - r * 0.2, 0, mx, my, r);
    g2.addColorStop(0, "#f5ede0");
    g2.addColorStop(0.6, "#e8dcc8");
    g2.addColorStop(1, "#c8b898");
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(mx, my, r, 0, TAU); ctx.fill();

    // 月面暗斑
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = "#a89870";
    ctx.beginPath(); ctx.arc(mx - r * 0.2, my + r * 0.15, r * 0.18, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + r * 0.25, my - r * 0.15, r * 0.12, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(mx + r * 0.05, my + r * 0.35, r * 0.09, 0, TAU); ctx.fill();
    ctx.restore();
  }

  let mountainPaths = [];
  function calcMountains() {
    const layers = [
      { base: 0.58, amp: 0.16, freq: 2.2, sub: 0.5, color: "rgba(6,4,14,0.95)" },
      { base: 0.68, amp: 0.10, freq: 3.5, sub: 0.3, color: "rgba(10,7,18,0.90)" },
      { base: 0.78, amp: 0.07, freq: 5.0, sub: 0.2, color: "rgba(14,10,22,0.85)" },
    ];
    mountainPaths = layers.map(l => {
      const pts = [];
      for (let x = 0; x <= W; x += 3) {
        const nx = x / W;
        const y = H * l.base
          - Math.sin(nx * PI * l.freq) * H * l.amp
          - Math.sin(nx * PI * l.freq * 2.7 + 1.3) * H * l.amp * l.sub
          - Math.sin(nx * PI * l.freq * 0.6 + 4.1) * H * l.amp * 0.4;
        pts.push({ x, y });
      }
      return { pts, color: l.color };
    });
  }
  function drawMountains() {
    for (const m of mountainPaths) {
      ctx.fillStyle = m.color;
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (const p of m.pts) ctx.lineTo(p.x, p.y);
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawGroundFog(t) {
    const fogH = H * 0.25;
    const fogY = H - fogH;
    const g = ctx.createLinearGradient(0, fogY, 0, H);
    g.addColorStop(0, "rgba(10,8,18,0)");
    g.addColorStop(0.4, "rgba(10,8,18,0.15)");
    g.addColorStop(1, "rgba(10,8,18,0.5)");
    ctx.fillStyle = g;
    ctx.fillRect(0, fogY, W, fogH);
  }

  // ═══════════════════════════════════════════════════════
  //  粒 子 · 樱 花
  // ═══════════════════════════════════════════════════════
  const SAKURA_COLORS = ["rgba(245,198,210,0.7)", "rgba(255,220,230,0.5)", "rgba(240,185,200,0.6)", "rgba(255,240,245,0.4)"];
  function spawnSakura() {
    if (sakuraPetals.length > 45) return;
    sakuraPetals.push({
      x: Math.random() * W * 1.2 - W * 0.1,
      y: -10 - Math.random() * 40,
      vx: 0.2 + Math.random() * 0.5,
      vy: 0.3 + Math.random() * 0.6,
      rot: Math.random() * TAU,
      rotSpd: (Math.random() - 0.5) * 0.03,
      size: 3 + Math.random() * 5,
      color: SAKURA_COLORS[Math.floor(Math.random() * SAKURA_COLORS.length)],
      wobblePhase: Math.random() * TAU,
      wobbleAmp: 0.3 + Math.random() * 0.8,
    });
  }
  function updateAndDrawSakura(t) {
    for (let i = sakuraPetals.length - 1; i >= 0; i--) {
      const p = sakuraPetals[i];
      p.x += p.vx + Math.sin(t * 0.001 + p.wobblePhase) * p.wobbleAmp;
      p.y += p.vy;
      p.rot += p.rotSpd;
      if (p.y > H + 20 || p.x > W + 40) { sakuraPetals.splice(i, 1); continue; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.moveTo(0, -p.size);
      ctx.quadraticCurveTo(p.size * 0.7, -p.size * 0.2, 0, p.size * 0.8);
      ctx.quadraticCurveTo(-p.size * 0.7, -p.size * 0.2, 0, -p.size);
      ctx.fill();
      ctx.restore();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  粒 子 · 萤 火
  // ═══════════════════════════════════════════════════════
  function initFireflies() {
    for (let i = 0; i < 22; i++) {
      fireflies.push({
        x: Math.random() * W,
        y: H * 0.3 + Math.random() * H * 0.6,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.2,
        size: 1.5 + Math.random() * 2.5,
        phase: Math.random() * TAU,
        speed: 0.001 + Math.random() * 0.003,
        hue: Math.random() > 0.6 ? 38 : (Math.random() > 0.5 ? 50 : 120),
      });
    }
  }
  function drawFireflies(t) {
    for (const f of fireflies) {
      f.x += f.vx + Math.sin(t * 0.0005 + f.phase) * 0.2;
      f.y += f.vy + Math.cos(t * 0.0004 + f.phase * 1.3) * 0.15;
      if (f.x < -20) f.x = W + 20;
      if (f.x > W + 20) f.x = -20;
      if (f.y < H * 0.2) f.vy += 0.01;
      if (f.y > H * 0.95) f.vy -= 0.01;
      f.vx *= 0.999; f.vy *= 0.999;
      const pulse = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * f.speed + f.phase));
      ctx.save();
      ctx.globalAlpha = pulse * 0.7;
      const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 4);
      g.addColorStop(0, `hsla(${f.hue},80%,70%,0.4)`);
      g.addColorStop(1, `hsla(${f.hue},80%,70%,0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.size * 4, 0, TAU); ctx.fill();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = `hsl(${f.hue},80%,75%)`;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.size * 0.6, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  粒 子 · 雾
  // ═══════════════════════════════════════════════════════
  function initMist() {
    for (let i = 0; i < 6; i++) {
      mistBlobs.push({
        x: Math.random() * W,
        y: H * 0.4 + Math.random() * H * 0.5,
        size: 80 + Math.random() * 160,
        speed: 0.05 + Math.random() * 0.15,
        phase: Math.random() * TAU,
        alpha: 0.015 + Math.random() * 0.025,
      });
    }
  }
  function drawMist(t) {
    for (const m of mistBlobs) {
      m.x += m.speed;
      if (m.x > W + m.size * 2) m.x = -m.size * 2;
      const y = m.y + Math.sin(t * 0.0002 + m.phase) * 15;
      ctx.save();
      ctx.globalAlpha = m.alpha;
      const g = ctx.createRadialGradient(m.x, y, 0, m.x, y, m.size);
      g.addColorStop(0, "rgba(180,170,160,0.5)");
      g.addColorStop(0.5, "rgba(160,150,140,0.2)");
      g.addColorStop(1, "rgba(140,130,120,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(m.x, y, m.size, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  头 像 · identicon
  // ═══════════════════════════════════════════════════════
  function makeAvatar(uid) {
    const seed = hashStr(uid);
    const rnd = mulberry32(seed);
    const hue = Math.floor(rnd() * 360);
    const color = `hsl(${hue}, 70%, 58%)`;
    const glow = `hsl(${hue}, 80%, 65%)`;
    const grid = [];
    for (let y = 0; y < 5; y++) {
      const row = [0, 0, 0, 0, 0];
      for (let x = 0; x < 3; x++) { const on = rnd() > 0.45 ? 1 : 0; row[x] = on; row[4 - x] = on; }
      grid.push(row);
    }
    return { grid, color, glow, hue };
  }

  function drawIdenticon(av, cx, cy, cellSize, alpha) {
    // 可爱默认头像：圆形渐变底 + 简笔表情
    const r = cellSize * 2.8;
    ctx.save();
    ctx.globalAlpha = alpha;
    // 圆形底色
    const g = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, 0, cx, cy, r);
    g.addColorStop(0, `hsl(${av.hue}, 55%, 65%)`);
    g.addColorStop(1, `hsl(${av.hue}, 50%, 45%)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU); ctx.fill();
    // 眼睛
    ctx.fillStyle = "#fff";
    const eyeY = cy - r * 0.12, eyeSpan = r * 0.28, eyeR = r * 0.15;
    ctx.beginPath(); ctx.arc(cx - eyeSpan, eyeY, eyeR, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + eyeSpan, eyeY, eyeR, 0, TAU); ctx.fill();
    // 瞳孔
    ctx.fillStyle = "#2a2a3a";
    const pupilR = eyeR * 0.55;
    ctx.beginPath(); ctx.arc(cx - eyeSpan + 1, eyeY + 1, pupilR, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + eyeSpan + 1, eyeY + 1, pupilR, 0, TAU); ctx.fill();
    // 高光
    ctx.fillStyle = "#fff";
    const hlR = pupilR * 0.4;
    ctx.beginPath(); ctx.arc(cx - eyeSpan - 1, eyeY - 1, hlR, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + eyeSpan - 1, eyeY - 1, hlR, 0, TAU); ctx.fill();
    // 微笑
    ctx.strokeStyle = "#2a2a3a";
    ctx.lineWidth = r * 0.06;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.arc(cx, cy + r * 0.05, r * 0.28, PI * 0.15, PI * 0.85);
    ctx.stroke();
    // 腮红
    ctx.globalAlpha = alpha * 0.25;
    ctx.fillStyle = `hsl(${(av.hue + 330) % 360}, 70%, 65%)`;
    ctx.beginPath(); ctx.arc(cx - r * 0.5, cy + r * 0.15, r * 0.15, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + r * 0.5, cy + r * 0.15, r * 0.15, 0, TAU); ctx.fill();
    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════
  //  入 场 金 光 爆 发
  // ═══════════════════════════════════════════════════════
  function spawnJoinBurst(cx, cy) {
    const burst = { x: cx, y: cy, start: performance.now(), particles: [] };
    for (let i = 0; i < 24; i++) {
      const a = (i / 24) * TAU + (Math.random() - 0.5) * 0.3;
      const spd = 1.5 + Math.random() * 3;
      burst.particles.push({
        x: cx, y: cy,
        vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
        size: 1.5 + Math.random() * 3,
        life: 1, decay: 0.01 + Math.random() * 0.008,
        hue: 38 + Math.random() * 15,
      });
    }
    joinBursts.push(burst);
  }

  function drawJoinBursts(t) {
    for (let bi = joinBursts.length - 1; bi >= 0; bi--) {
      const b = joinBursts[bi];
      const age = performance.now() - b.start;
      let alive = false;
      if (age < 600) {
        const k = 1 - age / 600;
        ctx.save();
        ctx.globalAlpha = k * 0.4;
        const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 60 * (1 - k * 0.5));
        g.addColorStop(0, "rgba(240,214,138,0.6)");
        g.addColorStop(1, "rgba(240,214,138,0)");
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(b.x, b.y, 60, 0, TAU); ctx.fill();
        ctx.restore();
        alive = true;
      }
      for (let i = b.particles.length - 1; i >= 0; i--) {
        const p = b.particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.97; p.vy *= 0.97;
        p.life -= p.decay;
        if (p.life <= 0) { b.particles.splice(i, 1); continue; }
        alive = true;
        ctx.save();
        ctx.globalAlpha = p.life * 0.8;
        ctx.fillStyle = `hsl(${p.hue},80%,65%)`;
        ctx.shadowColor = `hsla(${p.hue},90%,70%,0.6)`;
        ctx.shadowBlur = 6;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, TAU); ctx.fill();
        ctx.restore();
      }
      if (!alive) joinBursts.splice(bi, 1);
    }
  }

  // ═══════════════════════════════════════════════════════
  //  式 神 卡 牌
  // ═══════════════════════════════════════════════════════
  function spawnNode(uid, nick) {
    const seed = hashStr(uid);
    const rnd = mulberry32(seed ^ 0x9e3779b9);
    const node = {
      uid, nick: nick || uid.slice(0, 6),
      av: makeAvatar(uid),
      x: 60 + rnd() * Math.max(1, W - 120),
      y: 50 + rnd() * Math.max(1, H - 120),
      phase: rnd() * TAU,
      speed: 0.12 + rnd() * 0.2,
      drift: 14 + rnd() * 20,
      born: performance.now(),
      leaving: 0,
      bubble: null,
      pop: 0,
      channel: "main",
      msgCount: 0,
      img: null,
      // IMU 体感移动
      tiltDx: 0, tiltDy: 0,  // 当前倾斜方向 (-1~1)
      lastTilt: 0,            // 上次收到 move 的时间戳
      generating: false,      // 头像生成中
    };
    members.set(uid, node);
    return node;
  }

  // RPG 角色尺寸
  const CHAR_SIZE = 80; // 角色图大小（无边框）

  function drawCharacter(n, cx, cy, scale, alpha, t) {
    const size = CHAR_SIZE * scale;
    const r = getRarity(n.msgCount);
    const cc = chanColor(n.channel);

    ctx.save();
    ctx.globalAlpha = alpha;

    // ── 脚下阴影（椭圆形地面投影）──
    ctx.save();
    ctx.globalAlpha = alpha * 0.2;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.beginPath();
    ctx.ellipse(cx, cy + size * 0.48, size * 0.32, size * 0.08, 0, 0, TAU);
    ctx.fill();
    ctx.restore();

    // ── SSR 旋转光芒 ──
    if (r.tier === 3) {
      ctx.save();
      ctx.globalAlpha = alpha * 0.15;
      const rayCount = 10;
      const rayLen = size * 0.9;
      ctx.translate(cx, cy);
      ctx.rotate(t * 0.0003);
      for (let i = 0; i < rayCount; i++) {
        const a = (i / rayCount) * TAU;
        const hue = (38 + i * 8) % 60;
        ctx.fillStyle = `hsl(${hue}, 70%, 60%)`;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a - 0.05) * rayLen, Math.sin(a - 0.05) * rayLen);
        ctx.lineTo(Math.cos(a + 0.05) * rayLen, Math.sin(a + 0.05) * rayLen);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    // ── 稀有度光环（R+ 角色脚下/身后发光）──
    if (r.tier >= 1) {
      ctx.save();
      const glowR = size * 0.55;
      ctx.globalAlpha = alpha * (r.tier === 3 ? 0.25 : r.tier === 2 ? 0.18 : 0.1);
      let glowColor;
      if (r.tier === 3) {
        const hue = (t * 0.04) % 360;
        glowColor = `hsla(${hue}, 70%, 60%, 0.5)`;
      } else {
        glowColor = r.glow;
      }
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
      g.addColorStop(0, glowColor);
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, glowR, 0, TAU); ctx.fill();
      ctx.restore();
    }

    // ── SR 粒子飘散 ──
    if (r.tier === 2 && Math.random() < 0.12) {
      const angle = Math.random() * TAU;
      const dist = size * 0.4;
      sakuraPetals.push({
        x: cx + Math.cos(angle) * dist,
        y: cy + Math.sin(angle) * dist,
        vx: Math.cos(angle) * 0.3,
        vy: -0.3 - Math.random() * 0.3,
        rot: Math.random() * TAU,
        rotSpd: (Math.random() - 0.5) * 0.02,
        size: 2 + Math.random() * 2,
        color: "rgba(168,85,247,0.5)",
        wobblePhase: Math.random() * TAU,
        wobbleAmp: 0.2,
      });
    }

    // ── 角色图像（无边框，直接绘制）──
    const imgX = cx - size / 2, imgY = cy - size / 2;
    if (n.img && n.img.complete && n.img.naturalWidth) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.drawImage(n.img, imgX, imgY, size, size);
      ctx.restore();
    } else {
      // 可爱圆脸 fallback
      drawIdenticon(n.av, cx, cy, size / 6, alpha);
    }

    // ── 昵称（角色正下方）──
    ctx.save();
    ctx.globalAlpha = alpha * 0.9;
    ctx.fillStyle = cc.stroke; // 频道色昵称
    ctx.shadowColor = "rgba(0,0,0,0.7)";
    ctx.shadowBlur = 4;
    ctx.font = `${Math.max(11, 13 * scale)}px "Noto Serif SC", serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    const nick = n.nick.length > 6 ? n.nick.slice(0, 6) : n.nick;
    ctx.fillText(nick, cx, cy + size * 0.5 + 4 * scale);
    ctx.restore();

    // ── 头像生成中旋转指示器 ──
    if (n.generating) {
      ctx.save();
      ctx.globalAlpha = alpha * 0.7;
      ctx.strokeStyle = GOLD;
      ctx.lineWidth = 2;
      const spinR = size * 0.42;
      const spinAngle = t * 0.003;
      ctx.beginPath();
      ctx.arc(cx, cy - size * 0.1, spinR, spinAngle, spinAngle + PI * 1.2);
      ctx.stroke();
      // 小圆点在弧线末端
      const dotA = spinAngle + PI * 1.2;
      ctx.fillStyle = GOLD_B;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(dotA) * spinR, cy - size * 0.1 + Math.sin(dotA) * spinR, 3, 0, TAU);
      ctx.fill();
      // "生成中" 文字
      ctx.fillStyle = GOLD;
      ctx.font = '11px "Noto Serif SC", serif';
      ctx.textAlign = "center";
      ctx.fillText("生成中…", cx, cy - size * 0.55);
      ctx.restore();
    }

    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════
  //  气 泡
  // ═══════════════════════════════════════════════════════
  function drawBubble(text, cx, cy, alpha, channel) {
    const cc = chanColor(channel);
    const tag = (channel && channel !== "main") ? "#" + channel + " " : "";
    const body = text.length > 80 ? text.slice(0, 79) + "…" : text;
    const full = tag + body;
    ctx.save();
    ctx.font = '13px "Noto Serif SC", serif';

    // 自动换行
    const maxW = 280;
    const lines = [];
    let line = "";
    for (const ch of full) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        line = ch;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    if (lines.length > 3) { lines.length = 3; lines[2] = lines[2].slice(0, -1) + "…"; }

    const lineH = 18;
    const padX = 12, padY = 8;
    const widest = Math.max(...lines.map(l => ctx.measureText(l).width));
    const w = widest + padX * 2;
    const h = lines.length * lineH + padY * 2;
    const x = cx - w / 2, y = cy - h;

    ctx.globalAlpha = alpha * 0.92;
    ctx.fillStyle = cc.fill;
    ctx.strokeStyle = cc.stroke;
    ctx.lineWidth = 0.8;
    roundRect(x, y, w, h, 8);
    ctx.fill();
    ctx.globalAlpha = alpha * 0.4;
    ctx.stroke();
    ctx.globalAlpha = alpha * 0.92;

    // 小尾巴
    ctx.fillStyle = cc.fill;
    ctx.beginPath();
    ctx.moveTo(cx - 5, y + h);
    ctx.lineTo(cx + 5, y + h);
    ctx.lineTo(cx, y + h + 6);
    ctx.closePath();
    ctx.fill();

    // 文字
    ctx.fillStyle = "#e0dac8";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], cx, y + padY + i * lineH + lineH / 2);
    }
    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════
  //  NPC 月 灵 — 月亮就是 NPC
  // ═══════════════════════════════════════════════════════
  let npcAwake = false;   // 有人问问题时月亮“睡醒”
  let npcAwakeUntil = 0;

  function drawNpc(t) {
    // 月灵的实体 = 月亮本身（drawMoon 已经画了）
    // 这里只画“觉醒”特效：眼睛 + 增强光晕 + 气泡
    const mx = W * 0.80, my = H * 0.13;
    const r = Math.min(W, H) * 0.07;
    const now = performance.now();

    if (npcAwakeUntil && now > npcAwakeUntil) { npcAwake = false; npcAwakeUntil = 0; }

    if (npcAwake) {
      // 增强光晕脉动
      const pulse = 0.5 + 0.5 * Math.sin(t * 0.003);
      ctx.save();
      ctx.globalAlpha = 0.15 + pulse * 0.1;
      const ag = ctx.createRadialGradient(mx, my, r, mx, my, r * 3.5);
      ag.addColorStop(0, "rgba(232,223,200,0.3)");
      ag.addColorStop(1, "rgba(232,223,200,0)");
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.arc(mx, my, r * 3.5, 0, TAU); ctx.fill();
      ctx.restore();

      // Q版大圆眼（只画眼不画嘴，不恐怖）
      ctx.save();
      ctx.globalAlpha = 0.6 + pulse * 0.3;
      const eyeY = my - r * 0.05;
      const eyeSpan = r * 0.25;
      const eyeR = r * 0.12;
      // 白底
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(mx - eyeSpan, eyeY, eyeR, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(mx + eyeSpan, eyeY, eyeR, 0, TAU); ctx.fill();
      // 瞳孔
      ctx.fillStyle = "#2a2a3a";
      const pupilR = eyeR * 0.55;
      ctx.beginPath(); ctx.arc(mx - eyeSpan + 1, eyeY + 1, pupilR, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(mx + eyeSpan + 1, eyeY + 1, pupilR, 0, TAU); ctx.fill();
      // 高光
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(mx - eyeSpan - 1, eyeY - 1.5, pupilR * 0.4, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(mx + eyeSpan - 1, eyeY - 1.5, pupilR * 0.4, 0, TAU); ctx.fill();
      ctx.restore();

      // "月灵" 名字
      ctx.save();
      ctx.globalAlpha = 0.5 + pulse * 0.3;
      ctx.fillStyle = "#e8dfc8";
      ctx.shadowColor = "rgba(232,223,200,0.5)";
      ctx.shadowBlur = 8;
      ctx.font = '13px "Noto Serif SC", serif';
      ctx.textAlign = "center";
      ctx.fillText(NPC_NICK, mx, my + r + 20);
      ctx.restore();
    }

    // 月灵气泡（从月亮下方飘出）
    if (npcBubble && now < npcBubble.until) {
      drawNpcBubble(npcBubble, mx, my + r + 35);
    } else if (npcBubble) { npcBubble = null; }
  }

  function drawNpcBubble(b, cx, cy) {
    const isReply = b.type === "reply";
    const prefix = isReply ? "" : (b.nick ? b.nick + "问：" : "");
    const body = prefix + (b.text.length > 80 ? b.text.slice(0, 79) + "…" : b.text);
    ctx.save();
    ctx.font = '13px "Noto Serif SC", serif';

    // 自动换行
    const maxW = 300;
    const lines = [];
    let line = "";
    for (const ch of body) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line); line = ch;
      } else { line = test; }
    }
    if (line) lines.push(line);
    if (lines.length > 3) { lines.length = 3; lines[2] = lines[2].slice(0, -1) + "…"; }

    const lineH = 18;
    const padX = 14, padY = 8;
    const widest = Math.max(...lines.map(l => ctx.measureText(l).width));
    const w = widest + padX * 2;
    const h = lines.length * lineH + padY * 2;
    const x = cx - w / 2, y = cy;

    ctx.globalAlpha = 0.92;
    ctx.fillStyle = isReply ? "rgba(232,223,200,0.12)" : "rgba(10,6,14,0.92)";
    ctx.strokeStyle = isReply ? "rgba(232,223,200,0.3)" : GOLD;
    ctx.lineWidth = 0.8;
    roundRect(x, y, w, h, 6);
    ctx.fill();
    ctx.globalAlpha = 0.4;
    ctx.stroke();
    ctx.globalAlpha = 0.92;
    // 小尾巴朝上（指向月亮）
    ctx.fillStyle = isReply ? "rgba(232,223,200,0.12)" : "rgba(10,6,14,0.92)";
    ctx.beginPath();
    ctx.moveTo(cx - 4, y);
    ctx.lineTo(cx + 4, y);
    ctx.lineTo(cx, y - 5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = isReply ? "#e8dfc8" : "#e0dac8";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], cx, y + padY + i * lineH + lineH / 2);
    }
    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════
  //  表 情 特 效 · 国 风 水 墨
  // ═══════════════════════════════════════════════════════
  function spawnEmote(uid, emoteType) {
    const n = members.get(uid);
    if (!n) return;
    const wx = n.x + Math.cos(n.phase) * n.drift;
    const wy = n.y + Math.sin(n.phase * 1.3) * n.drift;
    const e = { type: emoteType, x: wx, y: wy, born: performance.now(), particles: [] };

    switch (emoteType) {
      case "ink":
        for (let i = 0; i < 22; i++) {
          const angle = -PI / 4 + (Math.random() - 0.5) * 0.8;
          const spd = 3 + Math.random() * 5;
          e.particles.push({ x: wx, y: wy, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
            size: 3 + Math.random() * 8, life: 1, decay: 0.008 + Math.random() * 0.005,
            color: Math.random() > 0.3 ? "rgba(30,24,20,0.8)" : "rgba(90,76,65,0.5)", trail: [] });
        }
        break;
      case "splash":
        for (let i = 0; i < 30; i++) {
          const a = Math.random() * TAU; const spd = 1 + Math.random() * 4;
          e.particles.push({ x: wx, y: wy, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
            size: 2 + Math.random() * 6, life: 1, decay: 0.01 + Math.random() * 0.008,
            color: `rgba(30,24,20,${0.4 + Math.random() * 0.4})` });
        }
        break;
      case "ripple":
        for (let i = 0; i < 4; i++) {
          e.particles.push({ x: wx, y: wy, radius: 0, maxRadius: 50 + i * 30,
            life: 1, decay: 0.008, delay: i * 12, color: "rgba(30,24,20,0.5)" });
        }
        break;
      case "sword":
        for (let i = 0; i < 18; i++) {
          const angle = -PI / 3 + (Math.random() - 0.5) * 0.4;
          const spd = 5 + Math.random() * 7;
          const hue = 38 + Math.random() * 15;
          e.particles.push({ x: wx, y: wy, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
            size: 2 + Math.random() * 3, life: 1, decay: 0.012 + Math.random() * 0.006,
            color: `hsla(${hue},85%,58%,0.8)`, glow: `hsla(${hue},90%,65%,0.6)`, trail: [] });
        }
        e.flash = { x: wx, y: wy, life: 1, size: 50 };
        break;
      case "incense":
        for (let i = 0; i < 14; i++) {
          e.particles.push({ x: wx + (Math.random() - 0.5) * 10, y: wy,
            vx: (Math.random() - 0.5) * 0.3, vy: -0.5 - Math.random() * 0.8,
            size: 6 + Math.random() * 14, life: 1, decay: 0.003 + Math.random() * 0.002,
            delay: i * 6, color: "rgba(90,76,65,0.2)", wobble: Math.random() * TAU });
        }
        break;
    }
    emoteEffects.push(e);
  }

  function drawEmoteEffects(t) {
    const now = performance.now();
    for (let ei = emoteEffects.length - 1; ei >= 0; ei--) {
      const e = emoteEffects[ei];
      const age = now - e.born;
      let alive = false;

      switch (e.type) {
        case "ink": case "splash":
          for (let i = e.particles.length - 1; i >= 0; i--) {
            const p = e.particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.vx *= 0.97; p.life -= p.decay;
            if (p.life <= 0) { e.particles.splice(i, 1); continue; }
            alive = true;
            ctx.save(); ctx.globalAlpha = p.life * 0.8;
            if (p.trail) {
              p.trail.push({ x: p.x, y: p.y });
              if (p.trail.length > 8) p.trail.shift();
              ctx.beginPath(); ctx.moveTo(p.trail[0].x, p.trail[0].y);
              for (const pt of p.trail) ctx.lineTo(pt.x, pt.y);
              ctx.lineWidth = p.size * p.life; ctx.strokeStyle = p.color; ctx.lineCap = "round"; ctx.stroke();
            }
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, TAU); ctx.fill();
            ctx.restore();
          }
          break;
        case "ripple":
          for (let i = e.particles.length - 1; i >= 0; i--) {
            const p = e.particles[i];
            if (age < p.delay * 16) { alive = true; continue; }
            p.radius += 1.5; p.life -= p.decay;
            if (p.life <= 0 || p.radius > p.maxRadius) { e.particles.splice(i, 1); continue; }
            alive = true;
            ctx.save(); ctx.globalAlpha = p.life * 0.5;
            ctx.strokeStyle = p.color; ctx.lineWidth = 2 * p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, TAU); ctx.stroke();
            ctx.restore();
          }
          break;
        case "sword":
          if (e.flash && e.flash.life > 0) {
            alive = true; e.flash.life -= 0.035;
            ctx.save(); ctx.globalAlpha = e.flash.life * 0.5;
            const g = ctx.createRadialGradient(e.flash.x, e.flash.y, 0, e.flash.x, e.flash.y, e.flash.size * e.flash.life);
            g.addColorStop(0, "rgba(240,214,138,0.7)"); g.addColorStop(1, "rgba(240,214,138,0)");
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(e.flash.x, e.flash.y, e.flash.size, 0, TAU); ctx.fill();
            ctx.restore();
          }
          for (let i = e.particles.length - 1; i >= 0; i--) {
            const p = e.particles[i];
            p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.life -= p.decay;
            if (p.life <= 0) { e.particles.splice(i, 1); continue; }
            alive = true;
            if (p.trail) { p.trail.push({ x: p.x, y: p.y }); if (p.trail.length > 6) p.trail.shift(); }
            ctx.save(); ctx.globalAlpha = p.life;
            ctx.shadowColor = p.glow; ctx.shadowBlur = 8; ctx.fillStyle = p.color;
            if (p.trail && p.trail.length > 1) {
              ctx.beginPath(); ctx.moveTo(p.trail[0].x, p.trail[0].y);
              for (const pt of p.trail) ctx.lineTo(pt.x, pt.y);
              ctx.lineWidth = p.size * p.life; ctx.strokeStyle = p.color; ctx.lineCap = "round"; ctx.stroke();
            }
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, TAU); ctx.fill();
            ctx.restore();
          }
          break;
        case "incense":
          for (let i = e.particles.length - 1; i >= 0; i--) {
            const p = e.particles[i];
            if (age < (p.delay || 0) * 16) { alive = true; continue; }
            p.x += p.vx + Math.sin((p.wobble || 0) + age * 0.003) * 0.3;
            p.y += p.vy; p.size += 0.15; p.life -= p.decay;
            if (p.life <= 0) { e.particles.splice(i, 1); continue; }
            alive = true;
            ctx.save(); ctx.globalAlpha = p.life * 0.35; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TAU); ctx.fill();
            ctx.restore();
          }
          break;
      }
      if (!alive) emoteEffects.splice(ei, 1);
    }
  }

  // ═══════════════════════════════════════════════════════
  //  成 就 法 阵
  // ═══════════════════════════════════════════════════════
  function drawAchCircle(t) {
    if (!achEffect) return;
    const age = performance.now() - achEffect.start;
    const duration = 4000;
    if (age > duration) { achEffect = null; return; }
    const progress = age / duration;
    const alpha = progress < 0.12 ? progress / 0.12 :
                  progress > 0.7 ? (1 - progress) / 0.3 : 1;

    const cx = W / 2, cy = H / 2;
    ctx.save();

    ctx.globalAlpha = alpha * 0.35;
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 1.5;
    const outerR = Math.min(W, H) * 0.22;
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, TAU); ctx.stroke();

    const tickCount = 24;
    for (let i = 0; i < tickCount; i++) {
      const a = (i / tickCount) * TAU + t * 0.0005;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * (outerR - 6), cy + Math.sin(a) * (outerR - 6));
      ctx.lineTo(cx + Math.cos(a) * (outerR + 6), cy + Math.sin(a) * (outerR + 6));
      ctx.stroke();
    }

    const midR = outerR * 0.72;
    ctx.beginPath(); ctx.arc(cx, cy, midR, 0, TAU); ctx.stroke();
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * TAU - t * 0.0008;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * (midR - 4), cy + Math.sin(a) * (midR - 4));
      ctx.lineTo(cx + Math.cos(a) * (midR + 4), cy + Math.sin(a) * (midR + 4));
      ctx.stroke();
    }

    ctx.globalAlpha = alpha * 0.25;
    ctx.lineWidth = 1.2;
    const starR = outerR * 0.55;
    for (let tri = 0; tri < 2; tri++) {
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * TAU + tri * PI / 3 + t * 0.0003 * (tri === 0 ? 1 : -1);
        const x = cx + Math.cos(a) * starR;
        const y = cy + Math.sin(a) * starR;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }

    ctx.globalAlpha = alpha * 0.15;
    const innerR = outerR * 0.3;
    for (let tri = 0; tri < 2; tri++) {
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * TAU + tri * PI / 3 - t * 0.0006;
        const x = cx + Math.cos(a) * innerR;
        const y = cy + Math.sin(a) * innerR;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }

    ctx.globalAlpha = alpha * 0.2;
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerR * 0.5);
    cg.addColorStop(0, "rgba(201,169,97,0.5)");
    cg.addColorStop(1, "rgba(201,169,97,0)");
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(cx, cy, outerR * 0.5, 0, TAU); ctx.fill();

    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════
  //  渲 染 循 环
  // ═══════════════════════════════════════════════════════
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight - 52 - 140;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    calcMountains();
  }
  window.addEventListener("resize", resize);

  let lastSakura = 0;

  function frame(t) {
    ctx.clearRect(0, 0, W, H);

    drawSky();
    drawStars(t);
    drawMoon(t);
    drawMountains();
    drawMist(t);
    drawGroundFog(t);
    drawAchCircle(t);

    const now = performance.now();
    for (const [uid, n] of members) {
      if (uid === NPC_UID) continue;
      let alpha = 1;
      if (n.leaving) {
        const k = (now - n.leaving) / 700;
        if (k >= 1) { members.delete(uid); continue; }
        alpha = 1 - k;
      }
      const age = now - n.born;
      let scale = 1, entryY = 0;
      if (age < 700) {
        const k = age / 700;
        scale = 0.3 + 0.7 * easeOutBack(k);
        entryY = (1 - easeOutQuart(k)) * 50;
        alpha *= easeOutQuart(k);
      }
      if (n.pop > 0) { scale *= 1 + 0.12 * n.pop; n.pop = Math.max(0, n.pop - 0.035); }

      const bobY = Math.sin(t * 0.0012 + n.phase * 2) * 3;
      // IMU 体感移动：倾斜方向驱动角色位置
      const tiltActive = n.lastTilt && (now - n.lastTilt < 1200);
      if (tiltActive) {
        const speed = 2.0;
        n.x += n.tiltDx * speed;
        n.y += n.tiltDy * speed;
      } else {
        // 无倾斜时：微小自由漂移
        n.x += Math.cos(t * 0.0002 * n.speed + n.phase) * 0.15;
        n.y += Math.sin(t * 0.0003 * n.speed + n.phase * 1.3) * 0.1;
      }
      // 边界钳位
      n.x = Math.max(50, Math.min(W - 50, n.x));
      n.y = Math.max(50, Math.min(H - 50, n.y));
      const wx = n.x;
      const wy = n.y + bobY + entryY;

      drawCharacter(n, wx, wy, scale, alpha, t);

      if (n.bubble && now < n.bubble.until) {
        drawBubble(n.bubble.text, wx, wy - CHAR_SIZE * scale * 0.55, alpha, n.bubble.channel || n.channel);
      } else if (n.bubble) { n.bubble = null; }
    }

    drawNpc(t);
    drawEmoteEffects(t);
    drawJoinBursts(t);

    if (t - lastSakura > 300) { spawnSakura(); lastSakura = t; }
    updateAndDrawSakura(t);
    drawFireflies(t);

    requestAnimationFrame(frame);
  }

  // ═══════════════════════════════════════════════════════
  //  日 志
  // ═══════════════════════════════════════════════════════
  const logEl = $("log");
  const MAX_LOG = 5;
  function pushLog(html) {
    const div = document.createElement("div");
    div.className = "line";
    const ts = new Date().toLocaleTimeString("zh-CN", { hour12: false });
    div.innerHTML = `<span class="ts">[${ts}]</span> ${html}`;
    logEl.appendChild(div);
    while (logEl.children.length > MAX_LOG) logEl.removeChild(logEl.firstChild);
  }

  // ═══════════════════════════════════════════════════════
  //  HUD
  // ═══════════════════════════════════════════════════════
  function updateHud() {
    let realCount = 0;
    const counts = { main: 0, fishing: 0, help: 0 };
    for (const n of members.values()) {
      if (n.uid === NPC_UID) continue;
      realCount++;
      counts[n.channel] = (counts[n.channel] || 0) + 1;
    }
    $("count").textContent = realCount;
    $("msgs").textContent = totalMessages;
    $("empty").classList.toggle("hidden", realCount > 0);
    const CH_LABELS = { main: "#主厅", fishing: "#摸鱼", help: "#求助" };
    for (const ch of CHANNELS) {
      const el = $("ch-" + ch);
      if (!el) continue;
      el.textContent = CH_LABELS[ch] + " " + counts[ch];
      el.classList.toggle("empty", counts[ch] === 0);
    }
  }

  // ═══════════════════════════════════════════════════════
  //  成 就 / 任 务 UI
  // ═══════════════════════════════════════════════════════
  let achTimer = null;
  function showAchievement(d) {
    const box = $("ach");
    const overlay = $("ach-overlay");
    box.querySelector(".emoji").textContent = d.emoji || "★";
    box.querySelector(".title").textContent = d.title || "";
    box.querySelector(".who").textContent = (d.nick || d.uid) + " — 觉醒";
    box.querySelector(".desc").textContent = d.desc || "";
    box.classList.add("show");
    overlay.classList.add("show");
    achEffect = { start: performance.now() };
    if (achTimer) clearTimeout(achTimer);
    achTimer = setTimeout(() => {
      box.classList.remove("show");
      overlay.classList.remove("show");
    }, 4000);
  }

  let taskTimer = null;
  function showTaskScroll(d, isComplete) {
    const box = $("task-scroll");
    box.querySelector(".task-who").textContent = (d.nick || d.uid) + (isComplete ? " — 任务达成" : " — 新任务");
    box.querySelector(".task-title").textContent = d.title || "";
    box.querySelector(".task-desc").textContent = d.desc || "";
    box.className = isComplete ? "complete show" : "show";
    if (taskTimer) clearTimeout(taskTimer);
    if (isComplete) {
      taskTimer = setTimeout(() => {
        box.className = "complete burn";
        taskTimer = setTimeout(() => { box.className = ""; }, 700);
      }, 2000);
    } else {
      taskTimer = setTimeout(() => { box.className = ""; }, 4000);
    }
  }

  // ═══════════════════════════════════════════════════════
  //  事 件 处 理
  // ═══════════════════════════════════════════════════════
  function applySnapshot(d) {
    members.clear();
    $("room").textContent = d.room || "hall";
    totalMessages = d.total_messages || 0;
    (d.members || []).forEach(m => {
      const n = spawnNode(m.uid, m.nick);
      n.born = performance.now() - 2000;
      n.channel = m.current_channel || "main";
      n.msgCount = m.msg_count || 0;
      if (m.png_b64) {
        const img = new Image();
        img.onload = () => { n.img = img; };
        img.src = "data:image/png;base64," + m.png_b64;
      }
    });
    updateHud();
    if (d.npc_avatar) {
      npcImg = new Image();
      npcImg.src = "data:image/png;base64," + d.npc_avatar;
    }
    pushLog(`<span class="sys">◈</span> 快照载入 · 在线 ${members.size}`);
  }

  function handleEvent(d) {
    switch (d.type) {
      case "snapshot":
        applySnapshot(d);
        break;
      case "join": {
        let n = members.get(d.uid);
        if (!n) n = spawnNode(d.uid, d.nick);
        else { n.nick = d.nick || n.nick; n.leaving = 0; }
        const wx = n.x + Math.cos(n.phase) * n.drift;
        const wy = n.y + Math.sin(n.phase * 1.3) * n.drift;
        spawnJoinBurst(wx, wy);
        updateHud();
        pushLog(`<span class="nick">${esc(d.nick || d.uid)}</span> 降临`);
        break;
      }
      case "leave": {
        const n = members.get(d.uid);
        if (n) n.leaving = performance.now();
        pushLog(`<span class="nick">${esc(d.nick || d.uid)}</span> 离去`);
        setTimeout(updateHud, 750);
        break;
      }
      case "msg": {
        if (d.uid === NPC_UID) break;
        totalMessages++;
        const n = members.get(d.uid);
        const ch = d.channel || "main";
        if (n) {
          n.channel = ch;
          n.bubble = { text: d.text, until: performance.now() + 5000, channel: ch };
          n.pop = 1;
          n.msgCount = (n.msgCount || 0) + 1;
        }
        const chTag = ch !== "main" ? `<span class="sys">#${esc(ch)}</span> ` : "";
        pushLog(`${chTag}<span class="nick">${esc(d.nick)}</span>: ${esc(d.text)}`);
        updateHud();
        break;
      }
      case "status":
        break;
      case "achievement": {
        const n = members.get(d.uid);
        if (n) n.pop = 1;
        pushLog(`<span class="sys">★</span> <span class="nick">${esc(d.nick || d.uid)}</span> 觉醒「${esc(d.title)}」`);
        showAchievement(d);
        break;
      }
      case "avatar": {
        const n = members.get(d.uid);
        if (n && d.png_b64) {
          n.generating = false;
          const img = new Image();
          img.onload = () => { n.img = img; n.pop = 1; };
          img.src = "data:image/png;base64," + d.png_b64;
          pushLog(`<span class="sys">◈</span> <span class="nick">${esc(d.nick || d.uid)}</span> 点亮新颜`);
        }
        break;
      }
      case "avatar_generating": {
        const n = members.get(d.uid);
        if (n) n.generating = true;
        pushLog(`<span class="sys">◈</span> <span class="nick">${esc(d.nick || d.uid)}</span> 头像生成中…`);
        break;
      }
      case "emote": {
        const EMOTE_LABELS = { ink: "甩墨痕", splash: "溅墨点", ripple: "涟漪墨圈", sword: "金色剑气", incense: "香炉轻烟" };
        spawnEmote(d.uid, d.emote);
        pushLog(`<span class="sys">✦</span> <span class="nick">${esc(d.nick || d.uid)}</span> ${esc(EMOTE_LABELS[d.emote] || d.emote)}`);
        break;
      }
      case "move": {
        const n = members.get(d.uid);
        if (n) {
          n.tiltDx = d.dx || 0;
          n.tiltDy = d.dy || 0;
          n.lastTilt = performance.now();
        }
        break;
      }
      case "npc_ask": {
        npcBubble = { text: d.text, until: performance.now() + 6000, type: "ask", nick: d.nick };
        npcAwake = true; npcAwakeUntil = performance.now() + 12000;
        pushLog(`<span class="sys">❓</span> <span class="nick">${esc(d.nick)}</span> 问月灵：${esc(d.text)}`);
        break;
      }
      case "npc_reply": {
        npcBubble = { text: d.text, until: performance.now() + 8000, type: "reply", nick: null };
        npcAwake = true; npcAwakeUntil = performance.now() + 12000;
        // 月光粒子从月亮位置散落
        const mx = W * 0.80, moonY = H * 0.13;
        for (let i = 0; i < 15; i++) {
          sakuraPetals.push({
            x: mx + (Math.random() - 0.5) * 60,
            y: moonY + 20 + Math.random() * 30,
            vx: (Math.random() - 0.5) * 0.8,
            vy: 0.3 + Math.random() * 0.5,
            rot: Math.random() * TAU, rotSpd: (Math.random() - 0.5) * 0.02,
            size: 2 + Math.random() * 3,
            color: "rgba(232,223,200,0.4)",
            wobblePhase: Math.random() * TAU, wobbleAmp: 0.3,
          });
        }
        pushLog(`<span class="sys">🌙</span> <span class="nick">月灵</span>：${esc(d.text)}`);
        break;
      }
      case "task_assign": {
        showTaskScroll(d, false);
        pushLog(`<span class="sys">📜</span> <span class="nick">${esc(d.nick)}</span> 领取「${esc(d.title)}」`);
        break;
      }
      case "task_complete": {
        showTaskScroll(d, true);
        spawnEmote(d.uid, "ink");
        pushLog(`<span class="sys">🔥</span> <span class="nick">${esc(d.nick)}</span> 达成「${esc(d.title)}」`);
        break;
      }
      case "ping":
        break;
    }
  }

  // ═══════════════════════════════════════════════════════
  //  WebSocket
  // ═══════════════════════════════════════════════════════
  const connEl = $("conn");
  let ws = null, retry = 0, retryTimer = null;

  function wsURL() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    return `${proto}//${location.host}/ws`;
  }

  function connect() {
    setConn("bad", "连接中…");
    ws = new WebSocket(wsURL());
    ws.onopen = () => {
      retry = 0;
      setConn("ok", "已连接");
      pushLog(`<span class="sys">◈</span> 已连接 · 闲逛堂`);
    };
    ws.onmessage = ev => {
      try { handleEvent(JSON.parse(ev.data)); } catch (e) { /* ignore */ }
    };
    ws.onclose = () => {
      setConn("bad", "重连中…");
      scheduleReconnect();
    };
    ws.onerror = () => { try { ws.close(); } catch (e) {} };
  }

  function scheduleReconnect() {
    if (retryTimer) return;
    const delay = Math.min(1000 * Math.pow(1.6, retry), 8000);
    retry++;
    retryTimer = setTimeout(() => { retryTimer = null; connect(); }, delay);
  }

  function setConn(cls, text) {
    connEl.className = cls;
    connEl.textContent = text;
  }
